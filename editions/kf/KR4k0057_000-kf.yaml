再盼望但還是依韻和了一首七律以排遣自己的思念之情詩中寫道秋香亭上舊因緣長記中秋半夜天鴛枕沁紅妝淚濕鳳衫凝碧唾花圓斷弦無複鸞膠續舊盒空勞蝶使傳惟有當時端正月清光能照兩人邊商生把采采的書信和自己的詩一起收藏在巾箱中每次拿出來看就要食不甘味寢不安睡好幾天大概是始終不能忘記自己同采采的感情的緣故商生的朋友山陽縣瞿佑對這件事知道得很詳細他既以道理勸慰商生又填寫了滿庭芳詞一首記載這件事那詞中寫道月老難憑星期易阻禦溝紅葉堪燒辛勤種玉擬弄鳳凰簫可惜國香無主零落盡露蕊煙條尋春晚綠陰青子鶗鴂已無聊藍橋雖不遠世無磨勒誰盜紅綃悵歡蹤永隔離恨難消回首秋香亭上雙桂老落葉飄飄相思債還他未了腸斷可憐宵此外又作文載錄了這件事的始末附在古今傳奇的後面多情的人讀了它則會感到章台柳被他人攀折讓才子佳人遺憾無窮而仗義的人聽說這件事就會像唐代傳奇無雙傳一樣去尋求茅山道士的假死之藥使俠客之心長在永存但是人們又哪里知道真正的結局不過像上面所說的而已寄梅記朱端朝表字廷之宋王朝南渡臨安後在太學裏修習課業與妓女馬瓊瓊很要好時間一長感情更加密切朱端朝非常富有文才馬瓊瓊知道他決不是久居貧困的人於是就傾心相愛凡是各種開資用途都全力供給他並且屢次說要把終身託付給他朱端朝雖然口裏應從但心裏其實不怎麽同意大抵是因爲他的妻子很妒悍倒不是對瓊瓊薄情時逢秋季鄉試選拔舉人朱端朝獲得了優勝馬瓊瓊高興地慰勞他於是朱端朝更加勤勉奮發在春季應進士考試中捷報傳來果然又中了優等等到了設問對答的考試朱端朝沒把握住分寸而太偏激就只好屈居榜尾起初他被選授爲南昌尉馬瓊瓊竭力向他懇求說賤妾流落風塵出身卑賤承蒙郎君不嫌棄我今天郎君的大名榮幸地登列在官列名字的簿籍此後你我如天地隔絕我也不能再侍奉枕席之歡賤妾這一生也終將淪落風塵中了實在是太可憐了希望郎君替我謀劃除去樂籍的事讓我永遠執持箕帚服侍您郎君的家政雖然謹嚴賤妾一定遷就遵從不敢唐突冒犯萬幸能夠讓我脫離妓女這個行當那麽我從郎君這裏得到的恩惠就實在不淺了況且賤妾的財力比較富足寬餘如極力圖謀除去樂籍應該不會是很困難的事朱端朝說謀劃除去樂籍的事固然容易只是擔心這樣做不能讓家裏人沒有嫉妒我考慮這個問題也已很久了你的盛情濃厚阻止你吧就近於無情無義順從你吧又擔心會有麻煩怎麽辦但既然這是出自於你的心願我會慢慢調教家妻讓她順從馴服一些這樣差不多能相安無事否則就沒有其他辦法可想了一天晚上朱端朝找到一個機會就對妻子說道我久在太學修習雖然最近獲得一個官職但是因爲家裏貧窮急於謀求俸祿豈能等待得了幾年的候補期而且所獲得的官職實在是出於妓女馬瓊瓊的恩賜現在她想倒空箱底拿出所有積蓄求托我替她除去樂籍她是個很小心的人能夠迎合人意倘若真能讓她脫離風塵之苦也算是有德行的人施加的恩惠了他的妻子說郎君的主意已定我也沒有什麽話可說朱端朝高興地對馬瓊瓊說起初我還擔心她不同意所以我試著問她沒想到她竟然愉快地同意了朱端朝於是想方設法到處求托馬瓊瓊的妓女名籍最終得以除去她就押運箱子等財物與朱端朝一起回家到家以後妻妾的關係還不錯朱端朝得到馬瓊瓊帶來的財物家境遂漸豐足於是另外開闢一個地方建造了兩座樓閣以東西來命名東閣給妻子居住讓瓊瓊住在西閣候補期滿以後來迎接的吏卒到了朱端朝因爲路途遙遠俸祿又少不想帶妻妾一同前去於是打算一人走馬上任快要出發的時候家裏設酒宴餞別朱端朝就叮囑她們說以後凡是寫家信你們東西兩閣合寫一封我回信也這樣朱端朝到了南昌半年以後才得到家裏消息但只有東閣妻子一封書信他當時也未曾放在心上而朱端朝的回信到家之後西閣馬瓊瓊也看不到向東閣討取吧又遭妻東閣的猜忌馬瓊瓊於是秘密地派遣了一個僕人多多地給他盤纏把一封書信交給他囑咐他說千萬不要讓夫人知道這件事書信送到南昌朱端朝打開一看沒有一字說到家裏情況只有一幅馬瓊瓊畫的梅雪扇面而已朱端朝反復觀賞玩味發現扇面後題有一首減字木蘭花詞詞雲雪梅妒色雪把梅花相抑勒梅性溫柔雪壓梅花怎起頭芳心欲破全仗東君來作主傳語東君早與梅花作主人端朝自此後坐臥不安日日夜夜都想著辭去官職大概因爲這意外獲得的官職都是靠了馬瓊瓊之力所以不能忘本呵不久朱端朝終究假託生病棄官回家到家之後妻妾一起出來迎接責怪他爲什麽任期未滿就突然作回來的打算可怎麽問他他都不回答一會兒擺酒接風朱端朝會集二閣說道我羈留在千里之外希望的是家裏人能和睦相處以使我稍稍感到安心前不久我見到西閣瓊瓊寄來的梅扇詞讀了之後真使我顧不上吃飯睡覺我怎麽能不回來呢東閣妻子聽了說道郎君現在已經做過官了你來試著評判一下誰是誰非罷朱端朝說道這個不是嘴巴可以說得清楚的你還是去拿紙筆讓我來寫罷隨後就作了一首浣溪沙詞詞雲梅正開時雪正狂兩般幽韻孰優長且宜持酒細端詳梅比雪花輸一白雪如梅蕊少些香天公非是不思量從此以後兩閣妻妾和好如初而朱端朝呢從此也不再出去做官了剪燈餘話卷一長安夜行錄明洪武初年湯銘之與文原吉二人都因爲精明練達學問淵博既有文才又有處理政務的能力而被當時的人所推崇