女婿這一年鄭生二十二歲大女兒蘭英二十歲小女兒蕙英十八歲吳地的百姓大多知道這件事有的人還將這事記錄下來寫成了掌故卷二令狐生冥夢錄令狐譔是一個剛直的人生來就不相信神靈傲慢放誕自以爲是凡是有人說到鬼神變化陰間困果報應等事情他必定要說大話指斥別人錯誤他所住的居所附近有一個叫烏老的家財可算得上巨富但是仍然貪圖利益沒完沒了並且膽敢做不義的事情他的兇惡是遠近聞名的一天晚上烏老突然生病死了死後三天又活了過來旁人問他什麽緣故他就說我死了以後家裏人爲我大做佛事多燒紙錢陰間的官吏很高興因此得以回到人世令狐譔聽到這話以後尤其憤憤不平說開始我以爲陽世間的貪官污吏才會貪贓枉法富人犯法後只要行賄就可以得到保全窮人沒有錢抵罪只好受罰而今竟然想不到陰間更加厲害於是是賦詩一首道一陌金錢便返魂公私隨處可通門鬼神有德開生路日月無光照覆盆貧者何緣蒙佛力富家容易受天恩早知善惡都無報多積黃金遺子孫詩寫成之後令狐譔郎誦了好幾遍這一夜他正點著蠟燭獨自坐著忽然有兩個鬼使卒樣子十分猙獰醜惡一直跑到他面前說奉地府之命來拘捕你令狐譔聽了大吃一驚正想逃避一鬼已抓住他的衣服一鬼忙拉著他的衣帶驅趕逼迫他出門腳不著地一會兒就到了陰間地府只見大官署就好像陽間禦史台中書省那些衙門一樣二鬼使帶著令狐譔進門遙遙可見殿上有鬼王披戴冠冕靠著桌子坐著二鬼挾持令狐譔讓他趴在階下然後上殿複命說奉命拘捕令狐譔已經拿到馬上聽到鬼王聲音嚴厲地說你既然讀儒家經典卻不知自我檢點竟敢口出狂言誣衊我官府應該交付犁舌地獄說完就有幾個鬼兵上來揪拉他叫他快走令狐譔大爲恐懼死死攀拉住殿檻不肯離去不一會兒檻欄就被拉斷了於是他不由大叫大喊令狐譔乃是人間一個讀書人沒有犯罪卻遭受刑罰皇天如果有知乞求明鑒這時只見殿上有一個穿著綠袍執持手版的官員叫明法的向鬼王稟告說這個人喜歡揭發攻擊他人的過錯匆忙定罪一定不肯伏罪不如讓他招供所犯罪行辨明他的罪責他就沒話好說了鬼王說好於是有一個官吏拿著紙筆放在令狐譔面前逼著他寫供狀令狐譔堅持說自己並無罪過不知道要招供什麽忽然聽到殿上說你說你無罪所謂一陌金錢便返魂公私隨處可通門是誰寫的令狐譔才恍然大悟立即下筆鄭重招供道敬聞混沌狀態下陰陽二氣相合才開始分出天地的形狀上下三才天地人並沒有把鬼神列在其中自中古以來才有多方面發端焚燒紙錢來交好神靈誦讀經文來奉承菩薩於是名山大川都有靈怪古廟叢祠也多主持大概因爲衆生愚昧糊塗世人冥頑不靈有的長期作惡而不思悔改有的行凶造孽卻不受約束依仗強暴欺侮弱小憑恃財富欺負窮人對上不孝敬君王父母對下不和睦於宗族鄉黨貪圖錢財背棄信義看到私利忘記恩義不知道天門高高而有九重地府深深排列十殿設立銼燒春磨地獄完備輪回報應的規制使做好事的人受到鼓勵而更加勤勉使做壞事的人受到懲罰而知道引以爲戒這可以算得上法律嚴密天道至公了但是政令所施只看到前過卻忽略了後罪耳目所到僅明察小殃反遺漏了大禍結果窮人進入監獄遭受禍殃富人誦讀經文免除了罪責只獵取被弓箭傷過的鳥卻常常漏掉能夠吞舟的大魚賞罰的法令本不應該如此至於我令狐譔世世爲寒士一個窮書生而已左支右撐不能免除兒女啼哭東寫西寫仍免不了時運不濟處境不順偶然因爲不公平的事而憤怒不滿結果馬上就會得到多嘴的罪名我現在後悔莫及但又把搖尾乞憐看作恥辱今天承蒙譴責懲處我的罪名逼著要我的書面供詞既碰觸了龍的逆鱗探取了龍下巴底下的珠子哪里還敢求生還既挑弄虎頭捋抹虎須本來就知道要受到禍害的我的供詞就寫到這裏了敬求審辨鬼王讀完在供詞上批道令狐譔立論很公正難以加罪他持志不移也不可用權勢使他屈服今天看他所陳述的言詞實在有理可以特許放還他回返陽間以表彰有古人遺風直道而行的人於是就命令再次拘捕烏老把他打人地獄又派遣了兩個鬼使送令狐譔回家令狐譔懇求兩個鬼使說我在人間以讀書爲生雖然聽說地獄的事情但是並不認爲真是這樣今天既然已經到了這裏可以看一看嗎鬼使說想看一看也不難只要稟報一下刑曹錄事就行了隨即領著令狐譔沿著西邊的長廊而行另外到達一個大廳但見文簿像山一樣堆積著錄事正坐在中間鬼使把令狐譔的請求向錄事稟白錄事就用紅筆批了一紙公文交給他們那上面的文字像篆文籀文那樣無法辨認令狐譔出了官署的的大門朝北走了一裏多路只見一座高高的鐵城黑霧彌漫在上空守衛很多都是牛頭鬼面黑色的身體紺青色的頭髮各自拿著戈戟之類的兵器在城門兩邊或坐或站兩個鬼使出示批文給他們看守衛就放他們進去了這時只見無數個罪人被剝皮刺血挑心挖眼他們叫喊哀痛之聲在鐵城回蕩不絕而遭受毒刑拷打的喊聲更驚天動地令狐譔又到了一個地方看到有兩根銅柱上面綁著男女二人有一個夜叉正用刀剖開他們的胸膛腸胃流出用滾燙的水澆灌名其刑曰洗滌令狐譔便詢問他們緣故鬼使說這個男人在陽世做醫生因爲給這個女人的丈夫治病就同這婦人私通不久婦人的丈夫病亡了雖然不是他們二人殺害的但是推究本情來定罪與殺害是相同的所以要受到這個報應令狐譔又到了一個地方看到僧尼都光著身子諸鬼用牛馬的皮覆蓋他們的身體於是這