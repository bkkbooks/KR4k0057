他以至成爲崔鶯鶯王嬌娜那類淫奔的女子辱沒了祖宗而且魏鵬居喪後失去神智五臟摧裂你再把這些東西交給他這實在不妥當這確實如人們所說的既不能按照禮來對待自己又不能按照禮來對待別人我實在替你感到難爲情也沒臉把這些東西帶給他娉娉聽了吐氣長歎說道你自從侍奉我一直小心謹慎我也喜歡你如同自己的同胞姐妹我們相處十年從來沒有分離過但是你尚且不知我的心思仍然有這番議論那麽外面紛紛揚揚的議論就更不值得奇怪了與其蒙受責難而活著還不如捐棄生命而死去說完就取出一條白絹准備上吊自殺福福見狀急忙上前制止又百般勸慰並立刻把那幾件東西給魏鵬送去魏鵬將這些紀念物收藏在行李中然後進入內廳向邢國夫人辭行邢國夫人贈送白銀五十兩魏鵬堅決推辭不予接受邢國夫人說道我知道五十兩白銀不成禮數聊表寸心而已希望居喪期間如果有空不要吝惜書信來慰撫老身魏鵬跪下說我數年來寄居門下深受您的恩惠慈愛豈止待我如賓客實在是把我當作兒子一樣恩施深厚如同使死者複生白骨長肉真是刻骨銘心我僥倖獲得微薄的官職本來希望能稍稍有所報答不幸的是禍害殃及先母遺棄我們而去我不得不東歸守孝遠離於您我心裏是多麽不願意只希望您能健康長壽說完低頭階庭流淚不止邢國夫人也感慨悲傷就讓春鴻去叫娉娉出來告別但再三催促娉娉就是不肯出來魏鵬也就不再竭力去請她了猜想娉娉大概是不忍心與他見面於是就告別邢國夫人出發了這一年秋天賈麟果然在浙江鄉試中中了舉人邢國夫人喜形於色說雙蓮的吉兆應驗了於是把重陰亭改名爲瑞蓮亭第二年賈麟赴京參加禮部考試也獲得了勝利被授予陝西咸甯知縣的職務就帶著全家一齊出發了娉娉自從與魏鵬分別後消瘦憔悴整日不吃不喝通宵不睡不眠失神失智終日以淚洗面再加上旅途顛簸道路艱難十天後才抵達咸寧而娉娉此時也已經氣息奄奄了邢國夫人爲此憂慮深切卻並不知道娉娉得病的緣由直到仔細盤問娉娉身邊的家人春鴻等才稍稍說了大致的情形邢國夫人懊悔違背了盟約但此時已經於事無補只好百般寬慰曉喻讓娉娉勉強喝下一些湯藥而已又過了一個多月娉娉將死的前一天她洗完澡梳妝打扮像往常一樣準備好佩巾在母親面前拜謝說女兒不幸病重彌留早晚要死母親的大恩還沒有報答我就要抱恨含怨命歸黃泉了幸好有靈昭弟弟可以爲您養老送終希望母親割捨難忍的私情不要因爲女兒之死而折磨自己又對賈麟說弟弟你聰明有才智早早就考取高第平步青雲前程遠大家門榮幸父母光耀只願你早擇佳偶好奉養母親姐姐命薄壽短來不及看到賢弟出人頭地了還要把身後事煩勞你我死後千萬不要火化只求寸土暫且停放靈柩等到賢弟解職北歸幽州時攜帶我的屍骨回家鄉安葬那我的志願就永遠完成娉娉回到寢室安撫福福說我的死亡只在早晚之間你好好服侍夫人不要想念我又將封好的手書囑託春鴻說替我把這封書信傳告魏生讓他知道我已是泉下之人了春鴻謹慎地收藏起來並且安慰地說小姐平生聰明通達超過普通人雖然是女流之輩卻深知事理也曾經鄙視焦仲卿伉儷自殘生命藐視苟奉倩因妻死而傷情難道現在忘記了嗎怎麽又自蹈覆轍呢況且魏生一去之後就斷了音訊雖然還在守喪中料想也快婚配了現在媒妁頻頻而來衆多錯雜天下多的是奇男子美丈夫憑著小姐的才貌與他們相配哪一個會不願意何必一定要魏生才稱心更何況夫人晚年只有小姐一個愛女萬一小姐真的淪亡夫人心裏怎麽能承受得了所以我私下替小姐認爲不值得希望小姐不要因爲我的地位低下就鄙棄我正確的言論勉強聽從我淺陋的話語能夠翻然醒悟用理智來發抒排遣自己的感情那麽這就不僅是春鴻的幸運也不僅是小姐的幸運而實在是夫人的大幸了娉娉說道咳你錯啦我難道是世間癡淫的女子不知道生命似水流逝麽我和魏生大概是命運不好彼此在母親的肚子裏已經締結婚約其後二家果然生男育女兩位母親的預言誓約簡直分毫不差那麽天意人事應該斷然可知了誰料母親鍾愛我終于沒將我嫁給魏生雖然是出於對我的恩惠慈愛但是不免背棄了盟約況且女子嫁人要從一而終如果圖謀另嫁他人那麽不是人人都可以作丈夫了嗎鬼神又會怎麽說我呢詩經說生則異室死則同穴我的心事魏生實際上都清楚春鴻你雖然待我情義深厚並處處爲我著想但是君子要以德愛人這是不可以遷就的說完以後淚如雨下春鴻也淒慘地告退離去到了晚上娉娉終於逝世賈麟用漆棺裝殮了姐姐並把靈柩暫時寄存在開元寺的僧房裏準備等任期滿後運回老家安葬沒有多久咸寧縣有一個大盜作案後逃往襄陽衙門准備派遣小吏康鏵前往襄陽追捕春鴻聽說後就拿出娉娉囑託的書信稟告賈麟想讓康鏵順便帶去給魏鵬賈麟拆開一看原來是娉娉集唐人詩句爲七言絕句十首是寄與魏鵬的訣別之詞賈麟把這件事稟告了母親邢國夫人說人已經去世了就不要再違背她的意願了於是就讓唐鏵帶去了娉娉的絕命詩爲兩行情淚語前流千里佳期一夕休倚柱尋思倍惆悵寂寥燈下不勝愁相見時難別亦難寒潮惟帶夕陽還鈿蟬金雁皆零落離別煙波傷玉顔倚闌無語倍傷情鄉思撩人撥不平寂寞閑庭春又晚杏花零落過清明自從消瘦減容光雲雨巫山枉斷腸獨宿孤房淚如雨秋宵只爲一人長紗窗日落漸黃昏春夢無心只似雲萬里關山音信斷將身何處更逢君一身憔悴對花眠零落殘魂倍黯然人面不知何處去悠悠生死別經年真成薄命久尋思宛轉娥眉能幾時漢水楚雲千萬裏留君不住益淒其魂歸冥溟魄歸泉卻恨青娥誤少年三尺孤墳何處是每逢寒食一潸然物換星移幾度秋鳥啼花落水空流人間何事堪惆悵貴賤同歸土一丘一封書寄數行啼莫動哀吟易慘淒古往今來只如此幾多紅粉委黃泥魏鵬在家居母喪以草薦爲席土塊爲枕真是度日如年追憶往日的歡樂驟然都成了舊迹但是仍然不知道娉娉已經死亡爲此他賦了一首摸魚兒追憶往事詞爲記當年浪遊江海湖山佳處頻到緋桃紅杏春光媚駿馬驕嘶馳道親曾造拜第一仙人聽鼓朝飛操風流音耗縱水隔篷壺浪翻銀漢青鳥解相報徒自悼憶刹那人情好萬千心事難告天涯回首成陳迹還想綠依紅靠空灑淚歎暑往寒來綠鬢秋成皓何時偎抱把月下鸞簫花間鳳管細寫斷腸套這首詞概略地敍述了與娉娉相遇的始末魏鵬抄完後正打算托人寄去突然康鏵從陝西來訪魏鵬得到娉娉死亡的凶信以及她所集的古句七絕詩讀完詩後悲傷怨恨暈倒後又醒過來於是就在峴首山墮淚碑旁設立靈位吊唁以酒澆地祭奠並且拿出娉娉生前的破鏡斷弦對天發誓說你既然爲我獻出了生命我又怎麽忍心辜負你呢只有終身不再娶親稍稍慰撫你的芳魂現將魏鵬的祭文抄錄在下面維大元至正十二年月日巨鹿魏鵬顓以清酌肴羞之奠遙祭于故賈氏雲華小娘子之靈嗚呼天地既判即分陰陽夫好攸合人道之常從一而殞是謂貞良二三其德是日淫荒昔我參政暨先平章僚友之好金蘭其芳施及壽母與餘先堂義若姊妹閨門頡頏適同有妊天戾厥祥指腹爲誓好音琅琅乃生君我二父繼亡君留浙水我返荊襄彼此闊別各居一方日月流邁逾十五霜千里跋涉訪君錢塘佩服慈訓初言是將冀遂曩約得諧姬薑因緣淺薄遂墮荒唐一斥不復竟成參商嗚呼君爲我死我爲君傷天高地厚莫訴衷腸玉容花貌宛在目傍斷弦裂鏡零落無光人非物是徒有涕滂悄悄寒夜隆隆朝陽佳人何在令德難忘曷以招子誰爲巫陽曷以慰子鰥居空房庶幾斯語聞於泉鄉峴山鬱鬱漢水湯湯山傾水竭此恨未央嗚呼小姐來舉餘觴尚饗不久魏鵬服喪期滿趕赴京都聽調朝廷升任他爲陝西儒學正提舉位列奉議大夫而賈麟做咸甯縣令任期尚未滿所以魏鵬又能與他們相見魏鵬登上中堂拜見老夫人發現邢國夫人更加衰老了邢國夫人看到魏生只會悲傷痛哭並且懊悔不已舊日的家人像脫歡這一輩的也有亡故的只有春鴻等幾位婢女都安然無恙魏鵬問清停放靈柩的房舍就前往哭拜他用手敲打僧房的門說雲華魏寓言在這裏我想你平生的精靈一定沒散難道不能再彈華山畿這首曲子了嗎這天晚上魏鵬就睡在辦公的處所似夢非夢的好像看見娉娉來說老天果真會順從人願嗎魏鵬忘記她已經死了急忙上前擁抱她娉娉說兄長不要拉我我有話要告訴你魏鵬這才想起她是鬼於是就問她說你已經告別人世現在怎麽能夠來到這裏娉娉說我死以後陰間的長官認爲我沒有過錯就讓我到金華宮但任起草章奏的書記之職現在陰間的君王被你終生不娶的誓言感動認爲你高尚的情義超過了宋代不嫌棄糟糠之妻的劉庭式他說不可以讓先參政品德高尚卻沒有後代傳揚將讓我還魂但是我的屍體已經朽爛現在謀求借他人的屍體只是尚未遇到機會預計在冬末才可以如願到那時又能相聚了說完後忽然飛走了魏鵬從夢中驚醒只見淡淡的月光照在簾子上冷風撲面而來環視四周頗感淒涼不覺流下幾行熱淚於是就寫了一首疏簾淡月詞悼念娉娉詞爲西湖皓月從前歲別來幾回圓缺何處淒然怕近暮秋時節花顔一去成終古灑西風淚流如血美人何在忍看殘鏡忍看殘玦忽今夕分明夢裏陡然相見手攜肩接微啓朱唇耳畔低聲兒說冥君許我返魂也教同心羅帶重結醒來驚怪還疑又信枕寒燈滅魏鵬到任之後不知不覺瑞雪紛飛梅蕊綻開日月運行光陰流逝又到了臘月當時陝西長安縣縣丞宋子璧有個沒有出嫁的閨女年齡剛滿十五歲忽然暴死停屍三日後活了過來不認她的父母卻說我是賈平章的女兒賈雲華是現任咸甯縣知縣賈麟的姐姐死了已經二年命當還魂現在借你女兒的屍體其實不是你的女兒宋家父母感到驚疑的是她的聲音不像原來的聲音說的話又不倫不類正在疑怪的時候這女子卻走出家門直奔賈知縣的住宅就好像以前曾經去過那裏一樣見了夫人和賈麟她詳細地說了還魂的事情邢國夫人和賈麟仔細看她聲音談笑像是娉娉舉止儀態也像是娉娉但是仍然不敢相信一會兒那女子進人寢室呼喚春鴻等幾位婢女的名字討取她活著時用過的物品真是一絲一毫也不差錯大家這才相信了她原來咸甯和長安都是西安府所在城的屬縣官舍相鄰宋縣丞也聽說賈知縣到任不久他的姐姐就亡故了但是還魂的事實在是世上少有於是就同妻子陳氏一同到賈知縣的宅第要討回女兒那女子堅決不肯回去並且辱駡道爲什麽要亂認別人家的女兒爲自己的女兒呢宋氏夫婦對此毫無辦法只好歎口氣回去了邢國夫人說這真是老天作合成的好姻緣於是就派人去告訴了魏鵬魏鵬也把夢中見到娉娉的事告訴了賈氏的母子夫人高興得說不出話來於是就讓媒人去傳達心意再次訂立盟約重新舉行婚禮新郎魏鵬手執禮品親自去接新娘邢國夫人帶著春鴻蘭苕等人都前往送行花燭之夜魏鵬發現這個娉娉真還是個處女但是她在枕邊與魏鵬敍談起往事卻一件小事都不曾遺忘第二天魏鵬在提舉公署的後堂擺下宴席宋縣丞一家也出席了宴會席間魏鵬順便問宋縣丞你女兒叫什麽名字宋縣丞回答後魏鵬才知道叫做月娥他又聽老門房說公署的後堂以前有一塊叫灑雪的匾大概是取李太白的詩清風灑蘭雪的意思後來被前一任提舉拿去現在就沒有了魏鵬這才理解以前在伍相廟做夢時神靈所說的話上句說的是成婚的地方下句說的是妻子的名字魏鵬把這件事遍告在座的人讓他們知道神靈說的話應驗了此事一時哄傳關中沒有人不讚歎這是一件奇事的有人賦永遇樂詞一首向魏生表示祝賀現在就把它抄錄在這裏傾國名姝出塵才子真個佳麗魚水因緣鸞鳳契合事如人意貝闕煙花龍宮風月漫托傳書柳毅想傳奇又添一段勾欄裏做還魂記稀稀罕罕奇奇怪怪湊得完完備備夢葉神言婚諧腹偶兩姓非容易牙床兒上繡衾兒裏渾似牡丹雙蒂問這番怎如前度一般滋味魏鵬和月娥後來生有三個兒子都做了高官魏鵬自己官至大禧宗禋院使兵部尚書年紀到八十三歲才死月娥也被封爲鄯國夫人直到七十九歲才亡故死後與魏鵬合葬在一起魏鵬與月娥平時吟詠唱和的作品多達千餘篇彙聚後題名爲唱隨集貫雲石酸齋在集子的前面爲他們作了序其後是魏鵬夫婦的自序這都登載在別錄中這裏就不再抄錄了
