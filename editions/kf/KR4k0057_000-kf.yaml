子之位堪稱宗室中的傑出人物難道他會做這等不仁道的事嗎青年說他本來就是這個樣子還值得奇怪麽但是在當時幾個宗室王中甯王還算得上是最喜歡讀書好學的了雖然他仗恃皇帝的恩寵做些糊塗的事但看到我的妻子用禮來堅持操守到底不忍侵犯她而其他宗室王的所作所爲那就更不值得一說了像岐王李范用餐從來不擺設桌子總讓各舞妓手捧器皿讓他品嘗申王李僞遇到冷天從不烤火而是把兩隻手放在歌伎的懷中一會兒就換好幾個人薛王李業則把木頭雕刻成一個美人讓木人穿上青衣晚上宴飲時就擺設木人執持燭火伎樂雜亂歌舞繁多那燭火特別奇怪客人如果想發狂取樂燭火就黑暗如漆等事情完畢燭火又亮了起來也不知他玩的什麽法術諸如此之類的事情難以一一列舉無非是窮奢極侈毀壞並完全抛棄禮儀法度假如我妻子落在他們手中難道還再能出來麽那麽這麽說起來甯王的賢惠德行又不可不知道了酒宴完畢夫婦兩人各贈一首詩給馬期仁丈夫的詩爲少年十五十六時隱身下混屠販兒乍可無營坐晦迹不說有學行求知四時活計看壚鏊八節歡情對酒卮紫糖旋瀉光滴乳白麵新和軟截脂大堪納吉團遮莒小可充盤圓疊棋火中幻出不虧缺素手纖纖擎日月漢賢逃難親曾賣今我和光還自匿室中萊婦知同調窗下儒仲敦高節自從結髮共糟糠長能舉案供微厥怡怡伉儷真難保布服荊釵有人悅樂昌明鏡一朝分奉倩寸腸中夜絕內家非是少明眸外舍寒微豈好逑寶位鴻圖既雲讓柳姿蒲質底須留貧賤只知操井臼凡庸未解事王侯去劍俄然得再合覆流信矣可重收願揮董筆祛疑惑聊爲陳人洗愧羞他妻子的詩爲妾家閥閾本尋常茆屋衡門環堵牆辛勤未暇事妝飾婉婉惟知佩禮章前年嫁得東鄰子博學多才貫經史致身不願取功名鬻餅甯甘溷閭裏朝朝日出肆門開童子高僧雜遝來得錢即已隨閉戶促席相看同舉杯何期忽作韓憑別赴水墜樓心已決紅蓮到處潔難汙白璧歸來完不缺當代豪華久已亡貞魂萬古抱悲傷煩公一掃荒唐論爲傳染鴻與孟光馬期仁吟詠賞玩再三然後放進袋中那青年就讓僕人引導客人到東廳客房睡覺一會兒只聽得遠方寺廟的鐘聲敲響鄰村的雄雞啼唱天色微明曙光淡弱馬期仁張開眼睛一看只見身上沾滿了露水濕淋淋的馬正在一旁不停地吃著草他環顧四面靜悄悄的昨晚看到的景物全都沒有了馬期仁回去之後把詩呈送給湯文兩公看他們都很欣賞認爲確實得唐詩真傳就命工匠把這兩首詩鐫刻在郡國東壁上讓它永遠流傳後來馬期仁果然憑藉文才學問升官做了翰林八十九歲才亡故符合前程遠大的說法湯銘之後來做了吉安太守聽說還經常對人們說起這件事的詳細情況聽經猿記江西廬陵郡的屬邑吉水縣有一座東山盤亙近百里雄鎮一方山色秀麗清奇看上去就像一幅圖畫後唐天成年間有位修禪師在東山絕頂處用茅草建造了一座庵廟修行這裏樹木茂密道路崎嶇不平常年累月人迹難得到此只有砍柴的人深入此地時看到修禪師坐在松樹底下總有群鳥銜著野果停集在他面前而修禪師則將野果一一拿來食用吃完了群鳥也就飛去了那些打柴的人偶爾把這件事告訴了別人於是好事的人相繼到草庵探訪禪師正在鼾睡中兔子爲他暖腳小鹿在床邊護衛衆人感到十分驚奇於是競相爲禪師清除地皮搜集木材準備建造一座大的寺廟開工之前禪師召集工匠告誡他們說你們手藝人一定會喝酒吃肉此處的山神老虎十分厲害不可輕易冒犯怎麽辦匠人齊聲回答說願意斷葷戒酒來建造廟宇禪師點頭同意了經過一個多月有一個工匠忽然想肉吃實在不能忍受所以就跑下山好幾天之後才回來這天他正在砍削木頭忽然兩隻老虎跳過牆壁進來站在工匠面前一左一右盯著他發出咆哮吼叫的聲音那人驚恐萬狀禪師說一定是你犯了戒你還是老實招供爲好我自會讓老虎走開工匠解下腰間的布袋交給禪師說正好經過醪橋集市買了一塊熟牛肉帶來作下飯的菜再也沒有其他了禪師說這就對了於是把牛肉截作兩段喂了老虎撫拍虎背說老虎姑且回去吧話音剛落虎就隱沒不見了於是人們更加欽敬禪師自此以後金銀財帛的施捨就像川河彙集一樣地到來廟字壯盛嚴整沒有多少日子就建成了廟宇落成之後禪師說法以報答各位施主講說闡發佛經妙義說得天花亂墜一會兒禪堂下忽然湧現出五口井來井裏滿貯米面油鹽蔬菜把這些東西拿來施飯食給衆人不多不少正夠禪師說這是五方龍五的貢獻救濟匱乏的人可以把這座山命名爲龍濟山把這寺廟命名爲清涼寺現在那四口井已經湮沒只有一口井還在寺廟前有許多高大的樹木遮天蔽日樹下有平坦的大石禪師每每席地而坐在上面念經日日如此成爲常例不想有一隻老猿猴棲息在樹間天天偷聽禪師念經並且偷看禪師已經眼熟了一天禪師偶爾有事離開老猿猴就從樹上下來穿上袈裟從大石上拿起佛經閱讀禪師回來正好撞見老猿慌忙中踉踉蹌蹌地逃走禪師沒有多問也未把這件事告訴給其他僧人只是心裏記住了它說這只猿猴已經領悟了佛法第二天果然有峽州袁秀才來訪禪師知道他來了就請他進來相見袁秀才穿著黑衣戴著黑頭巾風采神態質樸行禮完畢秀才告訴禪師說我姓袁單名遜表字文順峽州人氏家族龐大並且興旺但是都無意仕途只有我袁遜有志於功名想到京城求個一官半職做做明宗李嗣源是胡人晚年很昏庸所以賢良優秀的人才沒有一個能得到提拔我滯留京城幾年竟然一事無成後來有一個知己的朋友推薦我做端州的巡官我考慮那是有瘴氣的地方窮山惡水心裏非常不願意去那個朋友就勸我說你窘困到這種地步還有功夫選擇地方嗎不得已我才帶著家屬去走馬上任可是還不到一年功夫大小老婆及子女都死掉了只留下我憔悴一人於是我也不再做官了每每往來於江湖之間只是遊山玩水謝絕名利場上的紛亂問道參禪談論佛經中的空空之道聽到高僧在這裏建立大法幢我不怕路遠而來請求能夠依止這塊淨土皺眉蹙鼻本來不是嗜酒如命的陶潛伸手推敲倒很想那個苦吟詩句的賈島如果承蒙大師不嫌棄我我還有什麽可追求的呢說著當即拿出一封信交給禪師原來是拜師的書劄信用的是駢文體我私下以爲區區夢幻之身是因爲前生造孽熟悉三峽布滿煙霞的道路也是結了個好因緣凡是處在天地之間都處在輪回之內我恭敬地致書龍濟山主修公大禪師座下你靈性渾融如朗月雙目識破一切世事推衍術數確實比圖澄高明逞露神通完全超過了杯渡菩提本無樹講佛法高出同輩松柏枯倒變爲柴薪把浮名世事等同於泡影十方瞻仰四衆歸依象我袁遜這樣的人不過是天地間一根毫毛只能在山林活動悲來抱樹有誰可憐我傷弓之鳥的淒慘途窮則遁入樹林哪有時間選擇好樹居住無家可返有佛堪依心中哀痛妻子淪亡蹉跎歲月使功名無著逢人舞劍素來不是通臂之才過寺題詩忽然興起歸山之興天旋地轉無端變化經過了多少次湮沈春去秋來管什麽繁華有枯槁想要出類而拔萃除非舍妄以歸真請大師指引迷途讓我步入涅粲之路導領我登上覺岸攀上般若之舟我衷心希望你慈悲和南攝受禪師看完對他說絕好的文才同時又通佛典承蒙你不以此地爲僻遠定能使佛寺增添雄偉宏壯的氣象只是有一件事不便我不敢不告訴你袁遜說什麽事請您明示禪師說你如果頂著頭巾蓄起頭髮修行在我們佛教裏就叫做獼猴戴帽並不就像人如果即刻讓你剃去頭髮穿上僧衣在你們教派就叫做打著儒家的名義卻是墨家的行動像這樣兩種情況你怎麽處理呢袁遜恭敬不安好像臉上還有幾分愧色過了很久才說道只要心向禪宗又何妨通俗的打扮希望不要拘泥於外形倘若能夠食用吃殘一半的山芋那李泌自然是俗人能夠補寫未抄完的佛經房璃難道不是僧徒麽佛門廣大什麽人不能包容呢禪師說像你這番話真可以說是朝三暮四的猿人了袁遜說爲什麽這樣厲害地諷刺我禪師說隨便說說而已於是禪師就把袁遜留在西館讓他教教小和尚袁遜雖然天分聰明文詞敏捷但是玩耍騰躍屋梁喜歡作小孩子的樣子有時他在床上結跏趺坐用被子蒙住頭讓僧徒向他禮拜說這是白衣觀音現身了有時又在佛龕中張開兩腿像簸箕那樣坐著用深藍色的染料塗在臉上讓廚工向他致敬說這是洪山大聖前來監督齋食有時他又會把蛇放在碗缽中說這是降龍有時還將貓兒縛在座位下面把這叫作伏虎像這樣的情況不一而足寺裏的僧侶很討厭他就向禪師稟告禪師笑著說這不過是故態複萌罷了好好對待他衆人於是不敢再說而袁遜也依然如故但是山中景物經過他題寫吟詠的很多以至多得不能全部記錄下來這裏僅僅抄錄其中寫得特別好的一小部分題解空寺古塔淩空玉笱高斜陽半壓水嘈嘈老禪掩卻殘經坐靜聽松聲沸海濤書方丈幾曲風琴響暗泉亂紅飛墜佛龕前白雲深護高僧榻不許人間俗客眠送僧出山松翠侵衣屐印苔杖藜幾度此徘徊山僧忘卻山中好去入紅塵不再來詠鶴遠辭華表傍玄關別卻浮丘伴懶殘金磬數聲秋日晚雙飛帶得白雲還贈僧一瓶一缽一袈裟幾卷楞嚴到處家坐穩薄團忘出定滿身香雪墜曇花布袋和尚童子牽衣也不管放下布袋打鼾睡縈纏只是貪嗔癡解脫無過戒定慧毛女圖衣紉槲葉不須裁蘿月秋懸寶鏡開鶴背幾隨王母去蛾眉曾識祖龍來蟠桃結子三回熟若木爲薪十度摧回首同時金屋伴重泉玉匣葬寒灰落葉萬片霜紅照日鮮飛來增下覆苔磚等閒不遣僧童掃借與山中麂鹿眠方丈巢燕花正開雨霽春欲回緝壘成雙到穿簾作對來飛上下上下去又還白門辭王謝出入傍禪關鍾梵定長廊清晝靜遠近雛學飛呢喃語堪聽棲寺好畫棟雕梁巢莫保秋去春複來永伴山僧老山中四景門徑苔深客到稀遊絲低逐軟紅飛松梢零落飄金粉童子枝頭曬衲衣風敲窗竹驚僧定鳥觸殘花墜澗香圓覺半函看已了紉針自補舊衣裳幾點歸鴉幾杵鍾紛紛涼月在孤峰清霜獨染千林樹明月漫山一片紅十笏房靜百衲溫名香長是夜深焚道人愛看梅梢月分付山童莫掩門禪師有一天忽然身登佛堂命令侍者把袁秀才叫來告訴他說秀才臘月三十到了袁遜回答我已知道了禪師隨即唱偈暗示他說萬法千門總是空莫思嘯月更吟風這遭打個翻筋斗跳入毗盧覺海中袁遜頓時大徹大悟也作二偈回答禪師說泉石煙霞水木中皮毛雖異性靈同勞師爲說無生偈悟到無生始是空萬種嘍囉林大節千般伎倆木巢南從今踏破三生路有甚禪機更要參唱完袁遜端坐圓寂禪師集合僧衆說這個人有奇特的地方你們不可草率必須仔細觀察衆僧於是圍著他細細觀察原來是一隻猿猴禪師這才給僧衆說以前發生的事衆僧都讚歎稱異點燃柴草火葬他的時候禪師親自撫摩他的頭頂說二百年以後包你受用到了宋朝南渡末年有一個普通百姓家的婦女懷孕將要生産忽然夢見一隻猿猴進人房內結果生了一個男孩相貌與猿猴十分相似等到他長大成人卻不喜歡娶妻生子堅決要求出家當和尚父母只好順從他送他到龍濟山做了和尚法名叫作宗鍪以後他在修持方面的聲望很高常常是虎作侍者猿作隨從變化神奇莫測簡直說不完世人叫他肉身菩薩宗鍪果然能夠重修佛寺大轉法輪像吉水的螺山接待庵永寧橋都是他所建造的由於他的法號叫支雲寺院裏也叫他爲支雲鍪禪公他有十卷語錄和四卷文集其蛇穢說一文尤其在各地流行至今龍濟山的寺廟仍奉他爲重開山祖師在他坐化的忌日仍然有虎群圍繞寶塔這樣靈異的事後人按照宗鍪出生時間推算正好符合修禪師的預言也真是神了月夜彈琴記四明的烏斯道是一個學識廣博的正人君子明朝洪武初年他被任命爲吉安府永新縣的知縣到任三天就到縣學府去謁拜先聖孔夫子他看到殿堂前柱下的石墩旁邊隱隱約約好像有人形感到奇怪就問是怎麽一回事讀書人賀仲善告訴他這是宋代譚家的節婦趙氏的影子元兵下江南此地就歸順元朝了是文天祥丞相起兵救援王室收復了此地沒有多久原江西運使鎦槃降元後引元兵攻陷永新城城中百姓大半死於兵火譚氏一家倉卒之間避難逃進縣學節婦趙氏躲藏在大成殿亂兵追來見她年輕貌美就想污辱她節婦大罵說我是宗室之女名門的媳婦難道能成爲你們這群豬狗的配偶麽並且我的公公死在你們手裏我的婆婆又死在你們手裏我恨不能把你們的肉斬碎成萬段去喂烏鴉老鷹我只有一死而已豈能給你們這班豬狗做配偶元兵大怒就把她和手中抱著的一歲孩子都殺了鮮血滲入地磚從宋元到今天用沙石磨用烈火燒越見地磚光亮瑩潔同邑的人認爲她的行爲合乎道義而祭祀她烏公聽了這話就問祠在哪里賀仲善就領烏公到了祠廟只見老鼠在殘壁間穿行青苔長滿了空空的臺階真是陵穀變遷怨歎貞節的冤魂離今天太遠了時事變異感慨只有破舊的祠廟還存在烏公於是歎息說這是我做縣令的責任就捐出俸祿把學宮前水池邊的祠堂修繕一新又把節婦的影像刻在碑石的反面還親自撰寫了一篇文章刻在廊屋的牆上讀的人因爲驚懼而毛髮聳立感動得涕淚俱下這樣節婦趙氏的美名便得到了顯揚烏公的兒子單名熙表字緝之特別崇尚風度氣概而且精通琴藝他聽到節婦的事迹嘖嘖讚歎仰慕作貞松操一首並寫成琴曲一天晚上天空中月亮明朗夜色清涼人聲已靜烏緝之一人獨坐在有窗檻的房中正在按撫琴弦音位元標識調試琴弦忽然有一個美女從外面走了進來烏緝之驚訝地問什麽女子竟跑到這裏來美女向烏緝之道個萬福說我姓鍾叫碧桃是宋朝譚節婦的侍女我的主母貞烈天帝嘉獎她已讓她位登仙籍現在臨視南嶽衡山魏夫人的處所享受天上的快樂天帝因爲節婦的像留在下界塵世擔心以後世人會褻瀆輕慢就要派火神往下界取回讓像穿上仙服戴上道冠而坐藏入神仙的居處文昌忠孝司說像在孔子禮殿已得其所現在一定要取回不免伴隨狂風霹雷這會驚嚇宣聖孔子不是重道尊儒的辦法還不如留在人間讓像永遠激勵鼓舞人們這對於世風教化決非小補而有大益天帝認爲這個意見很對就命令玄樞省下文酆都讓縣學的土地常加守護雷神巡視按時稽查後來地府的長官建議認爲男女之道以遠嫌疑爲貴縣學的土地只可在外面衛護若是節婦跟前的守護應該起用舊人因爲我幸好沒有什麽罪孽早先就侍奉主母所以就授給我這個微薄的職位讓我侍衛只是我到職以來無處棲身只好暫時寄居在學宮的土地祠中隨便廁雜在男神之中很不便當想請求在節婦神座帝邊另外設立一個牌位題寫故侍兒鍾氏神主這幾個字那麽我就沒有無處棲身之苦而得到像燕雀那樣的巢穴使鬼有歸宿以免魚龍混雜如果承蒙您恤憫我希望馬上就做這件事烏緝之答應了碧桃的請求就問她節婦現在仙居南衡嶽山是否經常到祠中來呢碧桃說不來了自從您父親將祠廟修葺之後只是臨時來過一次那一夜萬籟俱寂月光照得像白天一樣我的主母俯視故鄉人事變遷而景物依舊看著黃塵清水土塊草堆禁不住有丁令威化鶴歸停華表柱上的感歎於是就拿出琴來演奏了一曲悲風我聽了以後感到淒慘眼淚像雨水一樣滾落主母對我說你現在仍然淹留在鬼籍之中沒有什麽東西可以安慰你你把紙筆拿來我遵命送上紙筆主母就蘸潤墨汁集古人詩句成七言近體詩二十首贈給我然後把筆扔向天空離去了烏緝之問道那些詩在什麽地方碧桃說我把它看作像玉璧一樣寶貴原稿不能給你即使給你那上面仙人所寫的奇字和道家符篆字體你也不可能認識但我可以吟誦你可以馬上把它們記錄下來詩爲花壓欄幹春晝長唐音溫飛卿清歌一曲斷君腸唐音沈雲卿雲飛雨散知何處唐溫飛卿天上人間兩渺茫鼓吹宋邕已托焦桐傳密意鼓吹胡宿不將清瑟理霓裳鼓吹宋邕江南舊事休重省草堂詩餘李玉詞桃葉桃根盡可傷詩統宋癢魂歸溟漠魄歸泉三體朱褒卻恨青娥誤少年鼓吹無名氏自是桃花貪結子唐音王建只應梅蕊故依然詩統陳簡齋風流肯落他人後唐李白哀樂猶驚逝水前鼓吹許渾何事黃昏尚凝睇鼓吹崔玨孤燈挑盡未成眠唐白樂天寒蛩唧唧樹蒼蒼三體李涉城上高樓接大荒鼓吹柳宗元午夜漏聲催曉箭唐杜甫六街晴色動秋光鼓吹張泌滿庭詩景飄紅葉三體雍陶此地悲風愁白楊唐李白舞袖弓彎渾忘卻屏上畫美人詩人間惟有鼠拖腸宋歐陽修雲想衣裳花想容唐李白青春已過亂離中唐音劉文房功名富貴若長在唐李白得喪悲歡儘是空唐溫飛卿窗裏日光飛野馬鼓吹韓催岩前樹色隱房櫳唐音王維身無彩鳳雙飛翼鼓吹李商隱油壁香車不再逢詩統晏殊應笑無成返薜蘿鼓吹譚用之年年惆悵是春過鼓吹羅鄴時攀芳樹愁花盡鼓吹溫飛卿寒戀重衾覺夢多唐