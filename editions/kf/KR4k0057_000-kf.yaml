那株風尾松原來已經枯死好幾年了龍生於是作了一首哀風尾歌道有草有草名鳳尾仙人種在丹山裏世間百卉避芳菲珊瑚寶樹差堪比髟參髟沙絕似鳳凰翎號以佳名同鳳稱海上行遲珠露濕洞簫品徹彩雲停娟娟旎旎猶貞靜琉璃刻葉琅玕柄九苞健翮時下來五色奇文爛相映日影照耀晴篩金盛夏脩脩風滿林豔陽不作桃李態晚歲實堅松柏心華堂清處搖新翠曾與飛瓊翠陰會倚從未許暫偷香指樹惟期終作配那知萬事終非真幽芳淑質俱成塵綺檻靈根凋百歲繡房麗色殞三春鳳兮偶昨來過此弄玉台傾鳳尾死鴛鴦瓦落野棠青孔雀展欹土花紫感時撫舊恨悠悠碧羽瓊蕤萬古休敗砌頹垣蛩吊月荒煙老樹鳥啼秋花草重栽春又綻鏡破釵離永分散因歌鳳尾寓深哀留與多情後人歎武平靈怪錄齊仲和單名諧是漳州人他本來是富家子弟稍有一點學問很會寫作文章但是豪俠而不受拘束揮金如土元至正十二年紅巾軍作亂齊諧的家業蕩然無存於是只好東奔西走到別人家做食客他曾經到武平縣項子堅家做塾師項子堅出身微寒突然之間發迹成了暴發戶就想光耀門庭所以婚嫁必定要依附攀扯上祖先有功業的世家巨室以便向人賣弄誇耀有聲望但現在又家道中落貧窮不振的名門大族就與他締結了婚姻一方是羡慕世家大族的名聲另一方則是貪圖暴發戶的錢財凡是書信公文帳冊記錄等類都是齊仲和爲他起草潤色不知道的人還以爲項家真是書香門第縉紳人家洪武五年項子堅亡故兩個兒子榮可貴可大辦喪事把項子堅葬在長汀縣的山裏距離他們居所有五十裏地齊仲和爲項子堅撰寫了行狀太史宋景濂應項家請求作了稱述其功德的銘文並且在墓旁修築歸全庵庵造得宏偉壯觀儼然像一座牌坊又撥出二百畝田作爲僧尼的衣食來源請南華本如真公主持庵中事務狀元金溪吳伯宗撰文記載了這件事以後齊仲和在武平縣往來因爲庵寺正巧在道途中所以每次經過必定在庵中留宿這一年他有點小事前往福州在那裏被人留作塾師好幾年不久項貴可舉孝廉被朝廷授予嘉興府同知的官職那一年倭寇侵犯海岸項貴可錯在沒有及時報告被朝廷治罪結果死在刑部的大獄中家產全部抄收沒官庵田也入官充公僧尼全部散去洪武十八年齊仲和從福州回來前往項家拜訪到達庵寺已經傍晚了就想在這裏借宿當時他並不知道項家已經敗亡庵寺也已廢棄他走入方丈的居處寂靜沒有人聲看看全部僧房有的開著門有的關著門最後到了一個僧房有一個僧人坐在床上聽到人的腳步聲驚奇地問誰啊齊仲和就把自己的姓名告訴了他僧人在黑暗中回答說原來是老朋友請坐齊仲和詢問僧人的法名僧人回答說山僧剛有這形骸時您趕上看到我難道現在忘記了嗎齊仲和也不曉得他說的是什麽意思就又問道其餘的僧人在哪里回答說偶然到施主家辦水陸法會去了只有我因爲長久患有中風的毛病不能下床所以留在庵寺中可惜能供役使的小和尚都出去了也沒有想到您會來茶食都沒有拿不出什麽東西款待你齊仲和告訴他還沒有吃飯僧人說供桌上有不到一升的殘豆您如果不嫌棄就請拿去吃了吧齊仲和餓極了抓過來就放在嘴裏嚼食於是順便問起項家的情況僧人說本來安然無恙齊仲和感到困倦請求去睡覺僧人說這裏有幾個客人每天晚上都會來找我閑聊一會兒就到我恐怕您會感到不安定齊仲和問道是些什麽人回答說都是附近村裏的良民也有的與項家有親戚齊仲和聽了高興地說道如果這樣的話那就很榮幸了一會兒有兩個人先跑了進來另有五個人隨後來到僧人對他們說道今天正巧遇上項家的老朋友光顧留宿在這裏各位不要驚訝齊仲和就請教來人的尊姓大名先到的兩人說我們是石子見毛原穎後到的五個人說我們是金兆祥曾瓦合皮以禮上官蓋木如愚齊仲和告謙說蠟燭油燈都沒有也不能行禮希望不要怪罪衆人應答說既然是項家舊日的塾師又是這庵寺的熟客都是一家人有什麽罪過於是衆人就與僧人一起講談論議口如懸河爭論不休深得佛法真諦僧人說諸位久入禪定怡悅心神應當避開爭論但是文人今天在座我們何不暫且停止空談來創作詩篇吟詠佳句以作爲今天這個清靜夜晚的歡樂材料呢衆人說好於是石子見率先吟誦道嘗擅文房四寶稱盡誇鴝眼勝金星華箋法帖長爲侶圓鏡方琴巧制形銅雀墜台成風味玉蟾吐水帶龍腥莫欺鈍壽渾無用曾與維摩寫佛經毛原穎的詩說早拜中書事祖龍江淹親向夢中逢遠誇秦代蒙恬巧近說吳興陸穎工雞距蘸來香霧濕狸毫點處膩朱紅於今贏得留空館老向禪龕作禿翁金兆祥的詩說身殘面黑眼生沙棄置塵埃野衲家僧病幾回將煮藥客來長是使煎茶無緣不復勞烹飪有漏從教老歲華昔日炎炎今寂寂莫將冷熱向人誇曾瓦合的詩說家貧無庇欲依誰散木微軀久覺衰孔聖絕糧寧敢慍範丹乏米豈辭饑當年墜地無須顧此日生塵不可炊榾柮煙消灰燼冷蒸蒸跨竈欲何爲皮以禮的詩說幻身如絮太輕鬆慣覆盧能與贊公裏裂不因兒惡臥繒穿只爲匠難逢塵灰積久無人洗蟣虱生多久火烘零落半歸蟲鼠蠹固知色相本來空上官蓋的詩說常人髹漆貴人朱生者憎嫌死者需除是飛升無用我若還解化也須餘能函蓋世英雄骨解殮傾城豔冶軀寄語勞勞塵世客百金莫惜預先儲木如愚的詩說長須古鬣骨棱棱心腹虛空不減增早悟有身應有患可堪無佛更無僧頻依鷲室行將腐久想龍門去未能朽木枯骸禪寂味一宵清話勝聞經吟誦完畢衆人拍手大笑就像旁邊沒有別人似的忽然風小雲消月光穿過窗戶齊仲