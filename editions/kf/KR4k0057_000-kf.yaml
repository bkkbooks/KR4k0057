落在紅羅鞋上於是形成油漬又一天晚上王生夢見女子把紫金碧甸戒指贈送給他王生自己解下水晶雙魚扇墜回贈她等到醒過來發現戒指確切在手中而再看自己的扇墜卻沒有了王生大感驚奇於是效仿元稹的詩體賦會真詩三十韻來記載這件事詩歌爲有美閨房秀天人謫降來風流元有種慧黠更多才碾玉成仙骨調脂作豔胎腰肢風外柳標格雪中梅合置千金星宜登七寶台妖姿應自許妙質孰能陪小小乘油壁真真醉彩灰輕塵生洛浦遠道接天臺放燕簾高卷迎人戶半開菖蒲難見面董蔻易含胎不待金屏射何勞玉手栽偷香渾似賈待月又如崔箏許秦宮奪琴從卓氏猜簫聲傳縹緲燭影照徘徊窗薄涵魚魷爐深噴麝煤眉橫青岫遠鬢軃綠雲堆釵玉輕輕制衫羅窄窄裁文鴛遊浩蕩瑞鳳舞毰毛思恨積鮫綃帕歡傳琥珀杯孤眠憐月姊多忌笑河魁化蝶能通夢遊蜂浪作媒雕欄行共倚繡褥坐相偎啖蔗逢佳境留環得異財綠陰鶯並宿紫氣劍雙埋良夜難虛度芳心未肯摧殘妝猶在臂別淚已凝腮漏滴何須促鐘聲且莫催峽中行雨過陌上看花回才子能知爾愚夫可語哉鯫生曾種福親得到篷萊詩成之後好事的人到處傳誦第二年王生又前往松江收租再次經過那個地方店主十分高興將他迎人家中王生不明白他的意思遲疑不進托辭退讓坐定以後老翁以誠相告說老夫只有一個女兒還沒有許配人家去年小郎君來渭塘在這裏飲酒女兒偶然看到了你感情不能自控於是就染上了疾病一直長睡並且自言自語如醉如癡服藥也沒有什麽效果昨天晚上她忽然說明天郎君要來了應該前去等候他開始我還以爲她說胡話本來並不相信豈知今天小郎君果然來到此地這真是老天爺顯靈賜予我們的好處呵於是老翁又問王生有沒有婚配還問了他的家世宗族聽了之後十分高興老翁握著王生的手帶他進入內室來到他女兒所居住的小房間王生見門庭窗戶都是夢中所遇到過的草木池沼器用雜物又都是當時夢中所見到過的那女子聽說是王生來了打扮得漂漂亮亮的出來豔麗的衣服華美的首飾又都是王生夢中所見到過的裝束那女子說去年自從郎君離去後思念殷切每夜夢中都要與郎君相會不知什麽緣故王生說我做夢也是如此啊女子一一敍說吹簫的曲子繡鞋的事情沒有一件不吻合女子又拿出水晶雙魚扇墜給王生看王生舉起手上的紫金碧甸戒指問她二人彼此都大爲吃驚認爲這是夢魂相交會此後女子於是就與王生結爲夫婦同行而歸最終白頭到老這可真說得上是一樁奇遇了卷三富貴發迹司志元至正六年泰州有一位讀書人叫何友仁被貧窮逼迫不能賴以生活於是就前往城隍廟竭拜求告經過廟裏東邊的廊屋他看到有一個幾案上面的匾額寫著富貴發迹司便馬上在神像前面祈禱說我來到人世已經四十五年冬天一件皮衣夏天一件葛衣早晚喝粥吃飯各一碗始終沒有做過揮霍無度膽大妄爲的事情但是終年忙忙碌碌常常有衣食不足的憂慮暖冬我仍有寒冷的擔心豐年我仍被饑餓所困擾出門沒有知親好友可以投靠居家又沒有一點存糧可以維持妻子兒女鄙棄我鄉親與我絕交困頓艱難無處訴說聽說大神您主管富貴的案牒掌握發迹的大權叩拜您就能聽到求告您都有所獲因此不怕責駡冒犯威嚴在庭前屏住氣息虔誠地向您鞠躬懇望告知偶然而來的事情曉喻未到的機遇指示迷途之士提拔隱居匿迹之人使枯乾的魚受鬥水而活命受困的鳥依託一枝而安全豈敢不拜受賜贈深切盼望您的洪恩如果以前命中注定以後沒有機緣氣數已經不可改變薄命終於沒有際遇也望能夠明白地昭示因果報應讓我能預先知道祈禱完畢就躊伏在幾案的簾幔下面這一夜東西的廊屋左右各官署都是燈燭輝煌人聲雜亂只有何友仁祈禱的官署不見一個人影也沒有一點燈光何友仁一個人在暗中大約快到半夜忽然聽到儀衛前呵後殿喝令讓道的聲音開始聲音很遠漸漸走近快要到廟門的時候各官署的判官都急忙出來迎接等到進入廟門只見判官排列成兩行隨從的儀仗十分齊整冥司太守穿著朝服雙手捧著手板登上正殿坐下判官們參見完後都回到自己的部門處理事務發迹司的主管也從正殿下來大概剛剛隨從冥司太守朝拜天使回來坐下以後有幾個判官都戴著襆頭烏紗圍著以角爲飾的腰帶穿著緋綠的朝服入門相見各自彙報所處理的事情一個人說某縣有某戶人家囤藏了兩千石米近來因爲旱寒蝗蟲交替米價倍漲鄰縣已經禁止米輸出田野裏有餓死的人這戶人家就打開糧倉賑濟只收取原來的價錢不求厚利又施捨館粥救濟貧窮的人因此而獲生路的人很多昨天縣神已向本署申告並呈報給冥司太守聽說已經上奏天廷讓他延長壽命三十六年並賜給他俸祿一萬鍾又一個人說某村有某婦女侍奉婆婆非常孝順她的丈夫出門在外可是婆婆得了重病頑疾請了醫生巫師來都沒有效果於是齋戒洗沐焚香向上天祝告願以自身代婆婆受苦並且割下自己腿上的肉煎湯給婆婆喝婆婆的病因此才得以痊愈昨日天廷詔命的行文下達說某婦孝順通達天地真誠感動了鬼神讓她生二個貴子長大後都能享受國君的俸祿光耀門弟最終能受到接受命婦封號的報答冥司太守已將公文下達到本署現在已經把她著錄在有福的名籍中又一個人說某官姓某爵位已經很高俸祿也很豐厚但是他不考慮怎麽報國只想貪污受賄接受三百錠紙幣就破壞法律胡斷公事收取白銀五百兩就違背情理迫害良民冥司太守已上奏天廷就將給他加上罪名只因爲他本人靠著先人陰德還有一點福份所以拖延幾年再讓他遭受滅族的禍害今天早上已接到命令把他登記在惡人的簿籍中只等時機到來而已又一個人說某鄉的某人有良田幾十頃但卻貪婪放縱不知滿足志在兼併別人土地鄰近有一塊田與他接壤他欺負人家勢單力薄孤立無援就用賤價買進但是又不給人家錢使那人含冤而死冥府已經指令本署將他拘捕入獄聽說他已化身變成了牛托生在鄰居家來償所欠的債務衆人彙報完後發迹司的主判官忽然橫眉張目長歎數聲對衆人說諸位各守本職分頭治理本職所屬的事務褒揚善良懲罰罪惡可以算得上周到了但是天地有運行的規律百姓也有災難接踵而來的時期君主一脈相傳的王朝漸漸衰敗大難將要興起縱然各位善於治理又有什麽辦法衆人間道這是什麽意思回答說我剛才跟從冥司太守上朝天門聽到各位神聖在推論將來的事情幾年之後戰火將會大起黃河以南長江以北合計將會有三十多萬人民被屠殺到那個時候如果不是積善聚德忠孝純真之至的人就不能免除禍害豈不是百姓沒福要遭此生靈塗炭的災難麽還是氣數命運已定沒有誰能逃脫呢大家都皺著眉頭互看幾眼說這就不是我們所能知道的了於是各自散去何友仁這才從幾案下爬出來拜見主判官並且述說緣由主判官看了他很久命令吏卒把簿籍拿來親自查看看完之後他對何友仁說您日後大有福祿不是一個久處貧困的人從此以後將會一天勝過一天擺脫陰晦走向光明何友仁希望他能夠講得詳細一點主判官就拿出紅筆大大地寫了十六個字交給他說遇日就康遇月就發遇雲就衰遇電就亡何友仁聽完把所授的字訣放在懷裏就拜了兩拜告辭出來走到廟門外面天色剛剛露出曙光何友仁急忙探取懷中的字訣可什麽也沒有了回到家裏他把這事兒說給了妻子聽聊以自慰過了沒幾天郡中有一個世家大族叫傅日英的請何友仁去教子弟讀書每月奉上酬金五錠家境這才逐漸豐足何友仁在這個私塾教了好幾年不久高郵張士誠起兵造反元朝命令丞相脫脫統領兵馬去討伐元朝太師達理月沙很有文化修養喜歡讀書何友仁在他面前獻計獻策很稱他的心他就把何友仁推薦給了丞相脫脫委任他當了隨軍參謀從此他有車馬隨從一下子就顯赫起來等到脫脫丞相出征回師何友仁就在朝廷做了官先是任職翰林後來又在中書省下各部爲官可以算得上大貴了不久他被任命爲文林郎內台禦史同僚有一個名叫雲石不花的與他不能和睦共處就在大官面前誣陷他結果被貶官爲雷州錄事友仁記起主判官的話日月雲三字都已經應驗了自己深深感到害怕保持戒慎不敢做違法非禮的事到任二年有一次他有事要申報總府文吏準備好公文送上友仁要在公文上簽署自己的官銜雷州路錄事何某揮筆的時候風把紙張吹起於是在雷字的下面拖出一條尾巴好像變成了一個雷字何友仁極爲忌諱立即命令手下重換公文當夜他就感染上了疾病何友仁自己知道將臥病不起就處理好家務事向妻子兒女決別後死亡妻子兒女這才詳知判官所敍述的衆位神聖的預言以及將來的事情從至正十一年以後張士誠在淮東起兵造反大明朝在淮西艱苦創業攻打爭奪戰爭相繼沿淮河各個郡縣大多遭受禍害死於兵災的百姓哪里只止三十萬呵因此可以想見普天之下疆域以內小到自身的盛衰和境遇順逆大到國家的興亡和治亂都有定數不可以隨便轉移變更但是平庸凡劣的人竟然總是想在這中間施展自己的才智和權術但那只會是徒然地自求困擾而已永州野廟記湖南永州的野外有一座神廟背靠大山面臨急流山深河險那裏長滿了黃茅和綠草一望無際高大的樹木聳人雲天遮蔽了太陽也不知有多多少少風雨常常在神廟上興起人們因爲畏懼都供奉神廟過路的人必定要把三牲等供物獻到神廟的殿下這才能通過如果誰不這樣做耶麽風雨就會突然到來一下子雲霧陰沈咫尺之間就辨不清東南西北了人和行李等物品也都會丟失不見這樣均情況已有好幾年了元大德年間書生畢應祥有事到衡州去要從神廟下這條路經過因爲囊中羞澀不能陳設祭品所以只對廟神致敬後就前行了還沒走幾裏路大風突然興起頓時飛沙走石黑雲黑霧從後面隱隱而來他回過身來一看只見披甲的士兵很多追的人差不多有千乘萬騎他料定自己這一次大概是必死無疑的了他平時能背誦道家經典玉樞經現在情勢既然十分危急他也就邊走邊背誦起來一路不停於口誰知過了一會兒雲消風止地闊天朗追兵騎乘一下子都看不見了這樣才獲得保全平安到達衡州畢應祥經過祝融峰時順路到南嶽祠拜謁想起以前發生的事情他就寫了狀子焚燒後向神投訴這一夜他夢見捕快來追趕他然後帶著他同行到了一個大宮殿但見侍衛環立職官四處都是捕快引他站在大庭之下畢應祥看到宮殿上挂著玉柵簾簾幕內設有黃羅帳燈火輝煌照得如同白晝一樣氣氛森嚴莊重寂靜而不喧嘩畢應祥緊張得屏住呼吸等待發落一會兒有個穿著朱衣圍著角帶的官吏從裏面走出來傳呼畢應祥說奉旨問你同何人有訴訟畢應祥趴在地下回答說我身爲窮書生天性又愚昧笨拙不知道有名利可以追求又怎麽會有田地房産值得爭逐穿的是布衣吃的是蔬食只曉得恪守本分罷了況且我從沒有進過公堂所以實在不能回答尊問官吏說白天你投遞狀子申訴什麽事應祥這才想起來於是叩頭稟告說實在是困爲貧窮的緣故我離開家鄉投奔他人取道永州經過神祠因爲盤纏已經用完不能用牲酒祭神以至觸犯神怒風雨突然興起受到披甲士兵的追趕狼狽窘迫跌跌撞撞幾乎被他們追上驚怕急迫之際沒有地方可以申訴因此冒犯聖靈實在是不得已官吏聽了後走進簾內過了一會兒他又出來說奉旨審訊對質就見有幾個屬吏騰空離去不多一會兒押來一個戴著烏頭巾穿著道服的白鬍子老人讓他跪在臺階下面官吏宣讀旨意並質問他說你作爲一方的神祗受到大家的供奉爲什麽經常用武力禍害恐嚇人以求他們的祭祀迫害這個讀書人幾乎讓他陷於死地貪婪狠毒哪里可以逃得了刑罰老人跪拜並回答說我確實是永州野廟的神祗但是野廟已被妖蟒佔據已經好幾年了我的能力不能制服它曠廢職守已經很久了過去呼風喚雨企求祭品的都是這個怪物所作的孽並非是我的過錯官吏呵責他說事情既然早已到了這個地步爲什麽不早稟報上來老人回答說這個怪物在世間已經很久了興妖作孽妖力大得沒有什麽東西可與它相比土地廟家祠及野廟裏的鬼魂都受到它的約束神龍毒蛇也聽它的指揮我每次想前來申訴都受到他多方的攔截最終不能到達這裏今天若不是神使來傳拿我哪里能到達這裏這時畢應祥聽到殿上傳旨命令士卒前去追究查問老人跪拜懇求說妖孽已經形成助紂爲虐的很多屬卒雖然前去恐怕最終沒有好處倘若不是派遣神兵前去剿捕捉肯定不能夠將它捉來殿上的官吏聽取了他的意見就命令一個神將帶領了五千神兵前往過了好久就見有數十個鬼兵用大木頭擡著妖怪的首級而到原來是一條朱頂的白蛇把蛇頭放在庭下就像能裝五石米的缸那麽大官吏讓畢應祥回去畢應祥這才伸了個懶腰從夢中醒了過來但渾身是汗濕透了背上的衣服畢應祥辦守事回家途中又一次經過那個地方只見神廟殿宇裏的塑像已經蕩然無存向村民一打聽都說某一天夜裏三更以後忽然間雷電風火大起只聽到一片殺聲大家都非常驚慌恐懼也不知道發生了什麽事天亮之後前去一看原來神廟已經成爲灰燼一條巨大的長幾十丈的白蛇死在樹木之下但是被砍掉了蛇頭其餘的毒蛇飛蛇蝮蛇之類也死了無數腥臊污穢的氣味一直到現在仍然沒有消失畢應祥算算時日那一天正是他感應於夢中的時候畢應祥回到家裏大白天正在家裏閑坐忽然見到兩個鬼使到他面前說陰間地府請你前去對質一件案子說完就拉著他的手臂前往到了那裏只見冥王坐在大廳上用鐵籠子罩著一個穿著白衣裳包著紅頭巾的男子那男子樣子長得很魁梧自己陳述道我在世間未犯下罪行卻被書生畢應祥向南嶽衡山府誣告以致神兵降臨討伐全族被殲滅巢穴淪亡冤苦確實很深畢應祥聽了這番話知道自己是被妖蛇懷恨誣告了就詳細陳述了妖蛇損人害物搞鬼搗亂等事與妖蛇在鐵籠之下對質辯論言詞一來一往非常激烈艱苦那妖蛇始終不肯服罪於是冥王就命令屬吏行文南嶽衡山府並指令永州城隍司驗證有關事實不久衡山府和永州城隍司的回文到了與畢應祥所說的事實完全相同妖蛇這才理屈詞窮冥王在殿上大怒叱駡妖蛇說你活著的時候已經成爲妖怪死了以後竟然還敢誣告把這個白衣妖怪押往酆都地獄讓它永遠不能翻身當即就有幾個鬼兵上來驅趕押解妖蛇而去讓它接受應有的報應隨後冥王對畢應祥說煩勞你走了一趟實在沒什麽可以報答於是就命令屬吏把畢姓的簿籍拿來在畢應祥的名字底下批了八個字去妖除害添壽一紀十二年畢應祥聽了馬上向冥王拜謝然後返回家裏等到了家門他就醒了地來原來自己正彎臂作枕伏在桌上睡覺申陽洞記隴西郡有個姓李的書生名收德逢年紀二十五歲擅長於騎馬射箭平日裏馳騁馬上援臂開弓以有膽有勇聞名但是從不理生計因此被鄉親們鄙棄元天歷年間父親的老朋友中有一個人被委任爲桂州監司於是李生就前去投靠他到了那裏才知道此人已經亡故只好流落當地而無法再回故鄉這個郡名山很多李生每天以打獵爲生出沒在大山裏從未休息過自己認爲這樣很快樂當地有一個大戶錢翁憑藉財産稱雄那裏他只有一個女兒年紀才十七歲錢翁很鍾愛她從來未讓她出門外一步所以即使是近親鄰居也很少見到她一天晚上天色昏暗又是風又是雨女兒忽然失蹤了看看門闥窗戶閉鎖同往常一樣沒有人知道她到哪里去了報到官府向神靈祈禱到四處尋訪都悄然沒有蹤迹錢翁想女兒心切發誓說有能知道我女兒的下落的我願把家財的一半給他並把女兒嫁給他錢翁尋女之心雖然迫切但是時間漸漸過去已有半年了竟然一點也沒有音訊有一天李生拿著弓挾著箭出城遇到一隻獐子窮追不舍於是翻越山巒深入溪澗山谷最終還是沒能追上這時天色已經昏黑又迷失了來路只好在高丘斜坡之間來回彷徨不曉得往哪里去一會兒天昏雲暗虎嘯猿叫遠遠近近黑乎乎的就好像到了一更天以後遙望山頂看到有一座古廟就打算投奔那裏棲身到了廟裏發現灰塵堆積牆壁倒塌鳥獸的足迹交雜在地李生雖然很害怕但也無可奈何只好在廊屋下稍事休息等待天亮還沒等他閉上眼睛忽然聽到一陣傳呼引導的聲音由遠而來李生想深山靜夜怎麽會有這種聲音呢懷疑這是鬼神所作又害怕被強盜打劫就爬上欄杆躲在梁上窺看動靜一會兒聲音到了門口只見兩盞紅燈作前導爲首的一個頭戴三山冠用紙巾包著頭披著淡黃的袍子腰間束著玉帶徑直走到神案後坐下隨從的有十來個各自執持器仗排列在階下儀仗雖然很整齊但是他們的相貌則都是公豬馬猴之類李生知道這是怪魅就拿出腰間的弓箭拉滿弓射了一箭這一箭正好射中坐著的怪