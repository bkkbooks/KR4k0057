body:
  text: 剪燈新話明瞿佑著目錄卷一水宮慶會錄三山福地志華亭逢故人記金鳳釵記聯芳樓記卷二令狐生冥夢錄天臺訪隱錄滕穆醉遊聚景園記牡丹燈記渭塘奇遇記卷三富貴發迹司志永州野廟記申陽洞記愛卿傳翠翠傳卷四龍堂靈會錄太虛司法傳修文舍人傳鑒湖夜泛記綠衣人傳附錄秋香亭記寄梅記剪燈餘話卷一長安夜行錄聽經猿記月夜彈琴記何思明遊酆都錄兩川都轄院志卷二連理樹記田洙遇薛濤聯句記青城舞劍錄秋夕訪琵琶亭記鸞鸞傳卷三風尾草記武平靈怪錄瓊奴傳幔亭遇仙錄胡媚娘傳卷四洞天花燭記泰山禦史傳江廟泥神記芙蓉屏記秋千會記至正妓人行卷五賈雲華還魂記卷一水宮慶會錄元至正四年潮州儒生余善文白天在家裏閑坐忽然有兩個力士頭戴黃頭巾身穿繡花衣服從外面走進屋來向他致敬說南海龍王廣利王有請善文驚訝地說廣利王乃是南海之神我善文是塵世中人陰陽路途不同彼此有什麽相干呢二人說您只管前行不要推辭於是余同他們一齊出南門外看到一條大紅船停泊在江邊登上船有兩條黃龍護衛而行快如風雨瞬息之間已經到了龍宮停在門前二力士進去通報過了一會兒來請他進去廣利王親自走下臺階迎接說久仰您的聲譽因此有請大駕還希望不要詫疑見怪隨即引他走上臺階要與他對面而坐余德文敬畏不安連連謙退廣利王說你住在陽界我居于水府互相並不統轄可不必推辭善文說大王您高貴尊嚴在下乃一介窮書生如何當得起這麽隆重的禮儀堅決推辭這時廣利王手下兩個臣子叫黿參軍鼈主簿的小步疾行而出啓奏說客人所言極是大王應順從他的請求不應自減聲威與德行有失體統廣利王於是居中而坐另外安放一榻在右邊讓善文坐並說寒舍偏僻簡陋向與蛟鱷魚蟹爲鄰居無以顯示神威宣揚天命現在打算另外構築一殿命名爲靈德工匠已發動木石等建築材料都已具備所缺少的唯有一篇上梁文而已聽說君子您擁有非凡的才能懷藏濟世的謀略因此特意邀請您到這裏希望能替我撰寫此文說完即刻命侍從拿出白玉硯捧上毛筆又備了一丈多長鮫綃紗放在善文面前余善文低頭聽命筆走紗面一揮而成未作任何修改那文章說道天地之間海爲最大人物之內神爲是靈既屬於人們供奉的神祗怎能沒有壯麗的宮室因此重建寶殿新定美名挂龍骨作爲大梁靈光耀日排魚鱗作瓦片瑞氣蟠空列明珠白壁之簾櫳接青雀黃龍之舸艦精美的小窗開啓時海色在戶華麗的宮門打開時有雲影降臨屋中雨順風調威鎮南海八千餘裏天高地厚流傳後世億萬斯年彙入江漢東流之水接納溪湖彙來之波河湖水神紛紜而到鬼國羅刹接踵而來巋然獨存若魯靈光殿美麗堂皇像漢景福宮控制蠻荊而接引甌越永壯宏規上達天庭而呈上貴重的琅玕宜興善頌遂爲短唱助舉修梁抛梁東方丈篷萊指顧中笑看扶桑三百尺金雞啼罷日輪紅抛梁西弱水流沙路不迷後夜瑤池王母降一雙青鳥向人啼抛梁南巨浸漫漫萬族涵要識封疆寬幾許大鵬飛盡水如藍抛梁北衆星絢爛環辰極遙瞻何處是中原一發青山浮翠色抛梁上乘龍夜去陪天仗袖中奏罷一封書盡與蒼生除禍瘴抛梁下水族紛綸承德化清曉頻聞贊拜聲江神河伯朝靈駕伏願上梁之後萬族歸仁百靈仰德珠宮貝闕上應天上的日月星辰袞衣繡裳具備人間的多福多壽寫完進獻給廣利王廣利王大喜選擇吉日完工派使者到東西北三海請各位龍王來赴慶祝宮殿落成之會第二天三位海神都到了隨從著千乘萬騎神龍猛蛟在前後跳躍長鯨大鯤在左右賓士至於一般的魚頭鬼面等差役及手執旌旗一一拿著戈呀戟的也真不知道有多多少少這一天廣利王頭戴通天冠身披絳紗袍手持碧玉圭跑到門前迎接禮節十分莊重三位海神亦各打扮得冠冕堂皇整飭好他們的劍珮服飾儀錶顯得莊嚴敬肅只不過所穿的衣袍各隨其方位有異而顔色不同寒暄已畢賓主作揖謙讓而坐余善文穿著平民的服飾也坐在殿角他正打算與三位海神敘禮相見忽然東海龍王廣淵王座後有一個隨從大臣頭戴禦史法冠長著長長鬍子名叫赤鮮公的跳躍到廣利王面前詢問道今天貴殿落成特地爲三位龍王安排了這個盛會縱然是長江漢水之長河川湖泊之君都不得廁身其間出席會議這禮可以算得上隆重莊嚴了可那個穿平民服飾坐在角落裏的是什麽人怎麽敢亂闖到這裏來了廣利王聞聲道這位乃是潮陽德才出衆的餘君善文我建造靈德殿特地邀請他來作上梁文的所以就留他在這裏了廣淵王見狀急忙說文人在座你哪來那麽多話還不給我退下赤鮮公於是慚愧地退了下去一會兒上酒奏樂有二十個美女振搖著珠玉串成的耳飾拖曳著靈巧輕便的衣裾列隊在筵前步履輕快地跳起舞來還唱起淩波之歌若有人兮波之中折楊柳兮采芙蓉振瑤環兮瓊珮璆鏘鳴兮玲瓏衣翩翩兮若驚鴻身矯矯兮如遊龍輕塵生兮羅襪斜日照兮芳容蹇獨立兮西複東羌可遇兮不可從忽飄然而長往禦泠泠之輕風跳完舞又有四十個小歌童打扮新穎別致舞動香袖在庭下跳起采蓮隊舞還唱起采蓮曲桂棹兮蘭舟泛波光兮遠遊捐予玞兮別浦解予珮兮芳洲波搖搖兮舟不定折荷花兮斷荷柄露何爲兮沾裳風何爲兮吹鬢棹歌起兮彩袖揮翡翠散兮鴛鴦飛張蓮葉兮爲蓋緝藕絲兮爲衣日欲落兮風更急微煙生兮淡月出早歸來兮難久留對芳華兮樂不可以終極兩支舞完畢而後敲起靈鼉鼓吹起玉龍笛衆樂齊鳴賓主觥籌交錯暢飲盡歡於是東西北三位海神共捧一杯酒向余善文致敬說我們僻居邊遠角落沒見過隆重的儀式今天盛會能夠看到如此盛大的禮儀而且有幸在這裏遇到你這位大君子真是倍增榮耀希望你能作一首詩以記載盛會使之流傳于龍宮水府或許也是一件美好的事情不知可不可以余善文推辭不掉於是寫下水宮慶會詩二十韻帝德乾坤大神功嶺海安淵宮開棟宇水路息波瀾列爵王侯貴分符地界寬威靈聞赫弈事業保全完南極常通奏炎方永授官登堂朝玉帛設宴會衣冠鳳舞三簷蓋龍馱七寶鞍傳書雙鯉躍扶輦六鼇蟠王母調金鼎天妃捧玉盤杯凝紅琥珀袖拂碧琅玕座上湘靈舞頻將錦瑟彈曲終漢女至忙把翠旗看瑞霧迷珠箔祥煙繞畫欄屏開雲母瑩簾卷水晶寒共飲三危露同餐九轉丹良辰宜酩酊樂事稱盤桓異味充喉舌靈光照肺肝渾如到兜率又似夢邯鄲獻酢陪高會歌呼得盡歡題詩傳勝事春色滿毫端詩寫完奉呈後賓主十分高興不久太陽落下山頂月亮從東穀升起諸位海神吃得大醉一一由人扶著出殿各自返回他們的水國而車馬布集的聲音過了很長時間仍不停止第二天廣利王特地設宴答謝余善文吃完飯廣利王命下屬用玻璃盤盛放了十顆夜明珠二枝通天犀牛角作爲詩文的報酬又派二個特使送他回家余善文回到家裏將所帶來的珍寶賣給了一家波斯珠寶店獲得億萬財産於是成爲豪富之家日後余善文也不把功名放在心裏丟棄家庭外出學道遍遊名山大川世人也不知道他的結局下落三山福地志元自實乃是山東人氏生來質樸魯鈍不通文墨但家境很富足以田地莊院所得爲生同鄉有一個繆君授得福建一個官職因缺少路費便到自實處借了二百兩銀子自實因爲同鄉交情很深也不問他要借條就如數借給了他元至正末年山東大亂自實被成群結隊的強盜搶劫家財一空當時平章政事陳友定守衛福建福建一帶很是安定於是自實帶著妻子兒女取海道往福州打算訪求繆君並投靠他到了福州以後打聽得繆君果然在陳友定幕府中掌權執政頗有威勢權力門第顯赫元自實十分高興但是在艱險困苦的處境下由於長途跋涉于道路衣服破爛容貌憔悴不敢馬上去見他於是在城中租賃了房子安頓下妻子兒女整飭衣帽選擇日子前往拜訪正巧碰上繆君外出就拜謁于馬前繆君起初好像不認識他等到聊起家鄉通報姓名才感到驚訝並表示道歉遂即引自實進冪並以賓主的禮節相待過了好一會兒喝完茶就送客了第二天元自實又去了繆府也不過招待三杯酒和茶果而已全然沒有一點眷顧的意思也不說起借銀兩的事兒元自實回到住所旅舍淒涼妻子兒女怨罵道你不遠萬里來投靠熟人所爲的是什麽事今天被三杯薄酒一搪塞就不發一言我們還有什麽指望元自實迫不得已第三天再次前往造訪可繆君好像已經十分討厭他了元自實正要開口繆君急忙說過去承蒙你借給我路費我一直銘記在心不敢忘記不過我現在仕途蕭條俸祿微薄但老朋友遠來豈敢辜負恩德希望能將借條還我我自當如數陸續奉還你借予的銀兩自實聽聞此言不由惶恐地說我與你共爲鄉親從小交往深密受命周濟急難向來沒有借條你今天爲什麽說出這樣的話來繆君神色嚴肅地說借條確實有只恐怕兵火之後您已經丟失了但是有沒有借條我也不去計較了只希望放寬期限讓我能盡力償還元自實只得唯唯而出卻責怪他的話巧詐狂妄負恩背義如此這真是羝羊的角觸人籬笆眼進退維穀了半個月以後元自實再次登門繆君只以好話打發他終究沒有一文錢的施予就這樣反覆推託於是很快過了半年這市中有一個小寺院元自實到繆君的家寺院正好在中途所以他就經常在門下歇腳寺院主持軒轅翁是個有道之人看到元自實經常往來日子長了就同他答話因此彼此就熟悉了時值隆冬已近新年元自實窮極無聊只好又來繆君的家拜求並且哭泣道新年臨近妻子兒女饑寒交迫袋裏沒有一文錢米缸裏沒有一點餘糧過去你所欠的銀兩今天我也不敢再求你歸還只求您像左傳裏所說的捐一鬥水救活涸轍中的鮒魚施一壺熟食來救翳桑的餓人這就是舊友的恩賜了懇望您憐憫憐憫我吧說著一頭趴伏在地繆君扶他起來扳著指頭算日子告訴他說再過十天應該是除夕你可以在家專心等待我從俸祿中分給你祿米二石銀子兩錠派人快馬送到你家作爲過年的費用希望不要以少爲怪並且又再三叮囑不用外出等候元自實感激而回到家後他就用繆君的話來安慰妻子兒女到了那一天全家盼望元自實端坐在床上派小兒子到閭裏的門前打探一會兒小兒子跑回來說有人背著米到了他聽了就急忙出家門等候誰知那人經過他們家時看都不看一眼元自實還以爲來的人不認識他們家急忙趕上去問他那人卻說這是張員外給塾師的糧食元自實遂默然回家一會兒小兒子又奔回來告訴他有人帶著錢來了他又急忙出去迎接可那人還是過他們家也不進來再追上去探問那人則說這是李縣令臨別時贈送給遊子的錢元自實聞言悵然而感到慚愧這樣的情況一連有好幾次到了晚上竟然還是一無蹤迹和音信第二天就是正月初一了元自實被繆君一誤再誤一粒米一束柴都來不及置辦妻子兒女相對哭泣元自實憤怒得不能自遏暗地裏磨了一把鋒利的刀坐著等待天亮等到雞叫更鼓停止他就直接奔往繆君的家打算等他出門時一刀刺死他此時東方還沒有發白路上沒有行人只有小寺院中的軒轅翁正點著蠟燭誦經對門而坐他看見元自實往前行走後面有奇形怪狀的幾十個鬼跟著有的鬼拿著刀劍有的鬼執持椎鑿披頭散髮裸露身體樣子很是兇惡大概有一頓飯的功夫自實又回來了後