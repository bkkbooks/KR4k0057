婦女三從的道理夫妻的名分已經確定爲什麽時事這麽艱難往日漢族建立的皇朝將要崩潰異族進犯的氣氛十分兇猛皇朝倒持太阿授人以柄賊盜如小兒私偷兵器戲弄於池塘旁邊擅起兵端大豬長蛇互相爭鬥雄蜂雌蝶各自逃生在亂世中不能自保氣節只好在倉卒無奈中求瓦全苟活從此驅馳戰馬追隨征鞍仰望高空縱然身有八個翅膀也不能飛翔思念故鄉的父母三魂屢屢驚散良辰易過哀傷青鸞陪伴木雞怨偶成仇害怕烏鴉欺淩鳳鳥雖然虛與應酬作樂終是感憤激發而生悲哀夜月下聽杜鵑啼血春風裏憶蝴蝶舊夢時過境遷苦盡甘來現在將軍則如楊素看到破鏡後歸還了妻子又如王敦開後宮的門放走了婢妾在篷萊履行當時的誓約於瀟湘與丈夫重逢自己傷感命運艱難不遺憾遊春太晚章台柳樹雖然已被他人攀折玄都桃花仍不改前度劉郎本來以爲瓶沈水底難覓玉簪斷了難續哪里料到如今玉璧物歸原主寶珠失而復得這差不多像玉簫女有兩世姻緣但是難比紅拂女當時就成爲夫妻這是老天給我方便事情決非絕然熬鸞膠再接斷弦重新和合夫妻感情托魚腹來傳遞家書敬告我們的音訊未能奉養雙親先在這裏表達我們的思念之情翠翠的父母得到書信喜出望外她的父親隨即租了一隻船與僕人從淮安往浙江直奔吳興而來僕人領他到了道場山下往日留宿的地方卻發現荒野上野草叢生狐兔的足迹交錯於小路以前所看見的大房子不過是東西兩座墳墓而已方在疑惑之間正巧有一個雲遊僧人持拿錫杖經過這裏翠翠的父親就向他詢問僧人說這是已故李將軍埋葬金生和翠娘的墳墓哪有人居住啊翠翠的父親大吃一驚取出翠翠的信一看原來只是一張白紙而當時李將軍已被明朝殺戮也無從去打聽詳細情況翠翠的父親在翠翠的墳前哭著說你用書信騙我讓我千里迢迢到這裏本來是想與我見一見面的今天我已到達此地而你卻藏蹤隱迹不露真相我與你活著時是父女死後又何必有區別呢你如果有靈千萬見我一見以解我心頭的疑慮這一天晚上翠翠的父親就在墳旁露宿約摸三更之後發現翠翠和金生跪拜在自己面前宛轉悲哭她父親也揮淚撫摸著翠翠並問她詳情翠翠就詳細敍說事情的來龍去脈過去禍起蕭牆鄰近的郡邑興起兵災我不能效仿竇氏姐妹的貞烈以至被番將劫持我忍辱偷生離鄉背井可恨我蕙蘭芳潔的身子卻要陪伴像掮客這樣低劣的人武夫只知道奪取石家買笑的美女哪里會有時間去可憐息國不說話的婦人我叫老天卻無路右走度一日如同三年丈夫不忘舊日的恩情特地不辭勞苦遠來尋訪假託兄妹的名義僅僅獲得見一面的機會夫妻之情隔離始終不能通達丈夫感染疾病先死我含著悲憤後亡希望能夠合葬萬幸最終獲得同歸一處大致的情況如此細節也說不完翠翠父親聽了說道我來這裏本來是想接你回家的侍奉我終老而已現在你已經亡故我將把你的遺骨遷回祖先的墳墓旁亦算我不白走一趟翠翠聞言又哭著說女兒生來不幸不能侍奉雙親死也無緣不得歸葬祖墳考慮到陰間崇尚寧靜靈魂應該得到安寧如果再遷移的話反而成爲煩擾更何況這裏山水秀麗草木繁榮既然已經安息在此再遷移就不是我的願望了說完抱著父親放聲大哭翠翠父親一下驚醒了過來卻原來是南柯一夢第二天翠翠的父親用三牲和甜酒祭奠於墳墓下然後與僕人坐船回家聽說至今經過道場山的行人還能指出金翠二人的墳墓所在卷四龍堂靈會錄吳江有一座龍王堂堂也就是廟宇是用來供奉香火的所以就叫它堂也有人認爲此地石岩陡峭而出就好像堤塘所以又把它叫做龍王塘這個地方左面是吳淞江右面是太湖風浪波濤十分兇猛又是江湖彙集之處過往的人一定要向廟宇致祭以後才可通行素來很靈驗這些事都詳細記載在范成大所編的吳郡志中元朝元統年間有一個姓聞的讀書人名叫子述以詩歌聞名吳下因爲經過此地正巧碰上龍吸水這是一條白龍龍須蜿蜒下垂像一條長長的玉柱龍鱗光芒閃耀像幾百片銀鏡在烏雲中翻滾飛旋很久才漸漸隱沒子述認爲自己平生所見的奇觀中沒有一件能與此相比雨停以後子述走進廟宇遍覽完畢就在廊屋下題寫古風一首道龍王之堂龍作主棟宇青紅照江渚歲時奉事孰敢違求晴得晴雨得雨平生好奇無與侔訪水尋山遍吳楚扁舟一葉過垂虹濯足滄浪浣塵土神龍有心慰勞苦變化風雲快觀睹鬐尾蜿蜒玉柱垂鱗甲光芒銀鏡舞村中稽首朝翁姥船上燃香拜商賈共說神龍素有靈降福除災敢輕侮我登龍堂共龍語至誠感格龍應許汲挽湖波作酒漿采掇江花當肴脯大字淋漓寫庭戶過者驚疑居者怒世間不識謫仙人笑別神龍指歸路聞子述題完詩回到了船上就躺在船篷的下面忽然有一個魚頭鬼身的怪物從廟裏跑了出來在聞子述面前行了個禮並說道龍王邀請您聞子述聽了說道龍王住在水宮鄙人遨遊塵世這是兩不相於風馬牛不相及的事即使有尊長之命又怎麽能到達水宮魚頭水怪說君子不要擔心只請你閉上眼睛一會兒就可到達聞子述聽從他的話閉起雙眼只聽到風聲和水聲作響過了很久聲音才漸漸止息聞子述張開眼睛只見宮殿樓宇高峻儀仗衛士森嚴排列寒光逼人不可細看真可謂是水晶宮龍王聽到聞子述到來穿戴整齊腰挂玉佩寶劍出迎隨後帶他走上臺階向他致謝說白天承蒙您惠贈大作詞意既美書法又妙廟宇得到這件墨寶光彩倍增因此有勞您大駕光臨想要酬謝您還沒等坐定守門人來傳話說有客人到了龍王聞言急忙出去迎接一會兒只見有三個人一起走了進來