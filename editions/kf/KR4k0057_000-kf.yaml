雄董仲舒司馬相如一類人麽在郡邑治民的官吏難道都是龔遂黃霸召信臣杜詩一類人麽千里馬去拉鹽車而劣等馬卻能飽食精飼料鳳凰棲息在有棘的灌木叢而貓頭鷹卻在門庭裏築巢鳴叫有才德的人面黃肌瘦而死在底層沒有才德的人比肩接踵顯達於塵世所以天下大治的日子常常很少而天下大亂的日子常常很多道理正在這裏陰間卻不是這樣升降一定公開賞罰一定公平過去那些背叛君主的蟊賊敗壞國家的奸臣他們接受了崇高的爵位並享受豐厚的俸祿到了陰間必定會遭受禍殃過去那些累積善行的人物修養德行的人土他們困厄在下層而窮困潦倒到了陰間必定會受到福報因爲輪回的規律因果報應的信條到這裏是沒有人能逃脫的於是夏顔倒滿酒杯而喝酒接連喝了好幾杯靠著欄杆眺望遠方隨口而成律詩二首吟誦贈給老朋友笑拍闌幹扣玉壺林鴉驚散渚禽呼一江流水三更月兩岸青山六代都富貴不來吾老矣幽明無間子知乎旁人若問前程事積善行仁是坦途滿身風露夜茫茫一片山光與水光鐵甕城邊人玩月鬼門關外客還鄉功名不博詩千首生死何殊夢一場賴有故人知此意清談終夕據藤床吟誦完畢夏顔搔著頭皮說最高的境界是樹立德業其次是建立功業再其次是著書立說我在世的時候沒有德業可以稱頌沒有功業可以敍述但是編著的集錄不下幾百卷寫的文章差不多有千餘篇這些都是探研事物深奧隱微竭盡全力寫成的東西去世以來家業衰敗裏面沒有照應門戶的僮仆外面缺乏對我的作品能理解評價的人再加上盜賊的偷竊蟲鼠的毀傷文稿已經十成裏面剩下不到一成十分可惜懇望老朋友愛惜人才顧念舊交捐獻季劄的三尺寶劍饋贈範純仁的一船麥子使用錢財到迫切需用的地方施捨恩德給無法回報的老友雕鏤在桐梓上傳給好事的人或許文稿可以不同草木一齊腐爛這則是老朋友的恩賜了我心有所感就說到這上面實在很慚愧老朋友答應了他夏顔喜出望外捧著酒杯向老朋友拜謝表達自己懇切的謝意過了不久東力漸漸發白夏顔與老朋友告別離去老朋友回到吳中尋訪到他家發現文稿除散失殘缺以外仍有遺留下來的文章數百篇以及編著的汲古錄通玄志等書友人於是急忙找工人雕版刻印在書鋪出售廣爲流傳夏顔又到老朋友的家裏道謝從此以後夏顔往來朋友家中不斷朋友家的吉凶禍福都預先告訴他三年以後老朋友染上了疾病夏顔來探訪就對他說在下在修文府充數年限已經滿了應當推舉人員來代替我陰間裏最看重這個職務要想得到它很難您如果不想這個職位那我不敢勉強萬一你想得到這個職位我一定盡力舉薦我所以急切考慮這件事不過是想報答您爲我雕板刻印著作的大恩而已人活在世上總歸要死的即使勉強拖延生命幾年又怎麽可能永遠居留在陽世呢老朋友高興地答應了他於是就安排身後的事情也不再找醫生治療幾天以後就死了鑒湖夜泛記有個讀書人成令言不求顯達向來喜歡會稽的山山水水元文宗天歷年間他在鑒湖之濱擇地居住吟誦千岩競秀萬壑爭流的詩句整天遨遊不止他經常乘一隻小船也不用撐篙和槳櫓以風作帆用浪作槳任船漂流或者在水邊觀魚或者在沙灘與鷗鳥爲伍或者在長有頻草的小洲同白鷺戲謔或者在植柳的水岸聽黃鶯啼叫沿湖三十裏方圓飛鳥走獸浮魚躍兔都熟悉他的相貌彼此忘卻是人或是禽獸自來自去不再互相疑慮害怕打柴的老翁耕田的農夫捕魚的兒童放牛的孩子遇到他不管老幼都能得到他的歡心初秋的一個晚上成令把小船停泊在紹興附近的千秋觀旁邊這時秋風剛起霜露未下天上的星斗交相輝映水光與天色渾爲一體不時聽到摘菱或采蓮女子所唱的歌曲此起彼伏就好像在水中陸地之間對歌似的成令言躺在船上仰望銀河它就像一條萬丈白練橫貫南北微雲淡淡如掃帚掃過的痕迹一塵不染於是成令言手敲船舷吟唱起宋之問的明河詩篇飄飄然有超然獨立於世俗之外飛升成仙的意趣忽然問小船自己動了起來走得很快就像是與風和水一起奔跑眼睛一眨就過了千里就像有東西在牽引著它成令言也搞不清究竟是怎麽回事一會兒到了一個地方這裏寒氣逼人冷光耀眼既像清澄的玉田珍花異草生長在其中又像盛大的銀海奇獸瑞魚在裏面游泳烏鴉成群鳴叫白榆遍地種植成令言猜想這裏不是人間就披上衣服起來只見宮殿巍然城闕高聳有一個仙女正從裏面走出來身穿白綃衣肩披白紈披肩頭戴翠鳳步搖冠腳蹬瓊紋九章鞋兩個侍女一個手執金柄的長扇一個捧著玉環如意明媚的眼睛美麗的容貌直覺光彩照人到了岸邊仙女對成令言說處士爲什麽來遲了成令言拱手回答在下隱居匿迹於江湖之間和魚鳥在一起忘記了自己的形迹向來沒有約請也從來沒有見過面爲什麽問這個問題仙女笑著說您怎麽會認識我呢所以請您到這裏是因爲您一向抱持崇高的德義長期來積聚大德我不過有一些真誠的想法想通過您傳到人世而已於是她就請成令言登岸邀請他進入宮門走了幾十步見到一個大殿匾額上寫著天章之殿殿后有一年高閣上面題著靈光之閣裏面設立雲母屏風鋪有玉華席四面都是水晶簾子用珊瑚鈎挂起照得閣內亮如白晝屋梁間還懸挂兩枚香球蘭麝香氣芬芳撲鼻仙女請成令言與她對席而坐並告訴他您知道這個地方嗎這就是人世間所說的銀河我乃是織女神這裏離開塵世間已經有八萬多裏了成令言聽了離開坐席說道我是下界一個愚蠢的百姓自甘與草木共同腐爛今天晚上多麽幸運讓我身遊天界腳登仙宮得福無可計量受恩超過希望但是不知道您想托我辦什麽事要我傳什麽話希望能詳細聽一聽好讓我打消疑慮仙女於是低頭正身端莊嚴肅地說道我乃是天帝的孫女靈星的女兒向來稟持貞節之性離群獨居哪里想到下界無知愚蠢的百姓喜歡荒誕妄傳在夏曆七月初七的晚上我會成爲牽牛神的配偶以致我清白的操行受到這種污辱開此謬說源頭的是齊諧的僞詐之書鼓起波浪的是記楚地風俗的荊楚歲時記中沒有根據的話傅會這種說法並予以倡導的是柳宗元的乞巧文誇張這件事並加以應和的是張耒的七夕詩詞對此即使強詞雄辯也無以自我表白而流言蜚語什麽地方聽不到呢常常在簡牘中流露也往往在篇章中傳播有的說北鬥佳人雙淚流眼穿腸斷爲牽牛又有的說莫言天下稀相見猶勝人間去不回有的說未會牽牛意若何須邀織女弄金梭又有的說時人不用穿針待沒得心情送巧來像這樣的詩作不止一篇兩篇而是很多很多褻瀆汙侮神靈也不知道忌諱害怕如果這都可以忍受還有什麽不可以忍受的呢成令言回答說鵲橋相會牛渚之遊的說法今天聽了仙女您的這番話我已經知道是不真實的了但是像嫦娥奔向月宮神女高唐幽會後土靈佑的故事以及湘靈冥會的詩句果然真有呢還是並非如此仙女悵然地說道嫦娥是月宮裏的仙女後土是地神中的神女大禹開闢三峽的功業巫山神女確實幫助了他而湘靈是堯的女兒舜的妃子她們都是聖賢的後裔貞節英烈之輩哪像世俗傳說那樣她們絕不像上元夫人從空中降落在封陟面前或雲英遭遇裴航杜蘭香嫁給張碩吳彩鸞許配給文簫等等情欲容易産生事情難以掩蓋的女子世人詠歎月亮的詩說嫦娥應悔偷靈藥碧海青天夜夜心題寫三峽的詩句說一自高唐賦成後楚天雲雨盡堪疑太陽和月亮在天地混沌的時候開天辟地的初始就已經形成了難道能編造後羿妻子的說法偷竊靈藥的事情胡亂用獨眠孤宿來侮辱她嗎雲是山川的靈氣雨是天地的恩澤怎麽可以因爲宋玉的謬誤就把雲雨指作房帷之樂比喻爲枕席之歡呢輕慢神靈冒瀆天威沒有什麽比這更厲害的了湘君夫人是帝舜的配偶舜死的時候就已經衰老了李群玉是什麽人竟敢用淫邪的詞賦在黃陵廟瀆犯說不知精爽落何處疑是行雲秋色中敍述自己的奇遇卻歸罪到她身上荒誕虛妄名譽和禮法掃地後土夫人的傳說是因爲唐朝人不敢直接指斥武則天的罪惡所以借此來諷刺她罷了世俗無知就以爲確實是這樣以至有韋郎年少耽閒事案上休看太白經的句子欲界的諸天都有配偶那些沒有配偶的則都是沒有欲望的君子和讀書人在禮教倫常中自有快樂的境地何至於編造那些鄙野猥瑣的故事誣衊誹謗高尚明過之人既用它來自己欺騙自己又用它來迷惑世人而讓自己處在有罪過的境地希望您回到塵世全部告訴世人不要讓雲霄之上星漢之間的仙女長久地受到黃口小兒的讒毀和玷污成令言又問道世俗多謊言升仙得道之人常被誣陷今天聽到神女這番話我已知道它們是虛假的但是像張騫乘木筏嚴君平辨別支機石一類事是確實的呢還是虛妄之說仙女說這二件事倒確實是這樣那博望侯張騫是金馬門的值吏嚴先生乃是仙宮的部曹暫時謫罰到人間靈性都在所以能夠周遊八極辨識異物這豈是常人能夠與之相比的麽您倘若不是三生有緣今天晚上也哪能到得了這裏說著便拿出彩錦兩匹送給成令言說道您可以回去了所托的事情希望不要忘記成令言告辭拜別了仙女之後登上小船只覺得風大露寒波濤洶湧一頓飯的功夫就已回到了原先那個地方這時淡淡的霧氣剛起星斗漸漸墜落雞叫三遍已到五更了他拿出彩錦一看好像與人間所織的也不相上下就把它藏在箱子裏準備等以後讓通曉各種事物的人來辨別一下後來碰到了一個從西域來的波斯商人就試著拿出來給他看商人撫摸賞玩了很長時間忽然動容說這是天上的至寶不是人間的東西成令言問他你是怎麽知道的呢那商人說道我見這彩錦的紋理順而不亂顔色純正而不錯雜用太陽照射則見瑞氣旺盛而起用塵土覆蓋則見塵土都自然而然地飛散開去用它作幃帳蚊子不敢進入用它作衣服披肩雨雪不會濕進去隆冬穿著它不用披著棉襖就能保暖盛夏張設它不用憑藉風力就感到涼爽它的蠶大概是用扶桑葉喂養的它的絲是用天河水洗滌的這難道不是天上織女機中的産品麽你是從哪里得到它的成令言保守秘密不肯敍述其中的緣故隨後他就駕著小船輕舟遠遊不再回來二十年以後有人在會稽山玉詞峰遇到過他只見他臉色紅潤兩隻眼珠清澈如水頭上戴著道士帽身上穿著布襖不裹頭巾也不紮衣帶那人向他揖拜並詢問成令言也不答話乘風而去快疾如飛追也追不上綠衣人傳甘肅天水的趙源很早就死了父母也沒有娶妻生子元仁宗延祐年間他求學到了錢塘寄住在西湖邊的葛嶺上居所的旁邊就是宋代賈似道的舊居趙源一人居住覺得清閒無聊曾經在某天晚上徘徊於門外看到一個女子從東邊走過來穿著綠衣梳著雙鬟十五六歲年紀雖然不是濃妝豔抹但是容貌遠遠超過一般人趙源盯住她看了很久趙源第二天晚上出門又碰到這個女子這樣有好幾次每天一到晚上這女子就會經過趙源開玩笑地問她小女子家住哪里爲什麽天天晚上來這裏女子笑著道了個萬福說我家與郎君是鄰居郎君自己不認識罷了趙源試著挑逗她女子很高興地回應了趙源就留她住下兩人極盡歡愛親昵第二天清早女子告辭而去但到了晚上重又來到這裏這樣差不